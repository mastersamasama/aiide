<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aiide — local agent observability</title>
<link rel="icon" href="/favicon.ico">
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --border: #2d333b;
    --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --ok: #3fb950; --warn: #d29922;
    --err: #f85149; --purple: #bc8cff; --cyan: #39c5cf;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.5 ui-monospace, "Cascadia Code", Consolas, "Microsoft YaHei", monospace; }
  header { display: flex; align-items: center; gap: 24px; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 5; }
  header h1 { font-size: 16px; margin: 0; color: var(--accent); }
  header h1 span { color: var(--dim); font-weight: normal; }
  nav a { color: var(--dim); text-decoration: none; margin-right: 18px; padding: 4px 2px; }
  nav a.active { color: var(--fg); border-bottom: 2px solid var(--accent); }
  .lang { margin-left: auto; }
  .lang button { background: var(--panel2); color: var(--dim); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; font: inherit; font-size: 12px; }
  .lang button.on { color: var(--fg); border-color: var(--accent); }
  main { padding: 20px 24px; max-width: 1280px; margin: 0 auto; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 12px; border: 1px solid var(--border); background: var(--panel2); color: var(--dim); margin: 0 3px 3px 0; }
  .badge.skill { color: var(--purple); border-color: #4a3a63; }
  .badge.err { color: var(--err); border-color: #6e2b2b; }
  .badge.ok { color: var(--ok); border-color: #2b5e37; }
  .badge.warn { color: var(--warn); border-color: #5e4a1a; }
  table { border-collapse: collapse; width: 100%; margin-top: 12px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--dim); font-weight: normal; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  tr.click { cursor: pointer; } tr.click:hover { background: var(--panel2); }
  a { color: var(--accent); text-decoration: none; }
  .cards { display: flex; gap: 14px; flex-wrap: wrap; margin: 14px 0; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; min-width: 130px; }
  .card .v { font-size: 22px; margin-top: 2px; } .card .k { color: var(--dim); font-size: 12px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; margin: 16px 0; }
  .panel h3 { margin: 0 0 10px; font-size: 13px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; }
  .muted { color: var(--dim); font-size: 12px; }
  .round { border-left: 3px solid var(--border); padding: 6px 0 6px 14px; margin: 4px 0; }
  .round.skill-round { border-left-color: var(--purple); }
  .round.user-turn { border-left-color: #3d5a4e; background: rgba(63,185,80,0.04); border-radius: 0 6px 6px 0; }
  details.round > summary { list-style: none; cursor: pointer; }
  details.round > summary::before { content: '▸ '; color: var(--dim); }
  details.round[open] > summary::before { content: '▾ '; }
  .round-body { margin: 8px 0 4px 16px; }
  .seg-bar { display: flex; height: 12px; border-radius: 3px; overflow: hidden; background: var(--panel2); }
  .seg-bar div { height: 100%; }
  .legend { font-size: 11px; color: var(--dim); margin: 3px 0 8px; }
  .legend b { font-weight: normal; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin: 0 4px 0 10px; }
  .tool-block { border: 1px solid var(--border); border-radius: 6px; margin: 8px 0; }
  .tool-block .th { padding: 5px 10px; background: var(--panel2); font-size: 12px; }
  .tool-block .tb { padding: 4px 10px; }
  .btn { background: var(--panel2); color: var(--dim); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; font: inherit; font-size: 12px; margin-left: 8px; }
  .btn:hover { color: var(--fg); border-color: var(--accent); }
  .cmp-a { color: var(--accent); } .cmp-b { color: var(--purple); }
  .bar-bg { background: var(--panel2); border-radius: 3px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
  .score-row { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
  .score-row .lbl { width: 220px; }
  .score-row .val { width: 60px; text-align: right; }
  .tip { position: relative; display: inline-flex; align-items: center; gap: 6px; }
  .tipbtn { cursor: help; width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border);
    color: var(--accent); display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; flex: none; user-select: none; }
  .tippop { display: none; position: absolute; bottom: calc(100% + 6px); left: 0; z-index: 50;
    width: max-content; max-width: min(420px, 78vw);
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 11px;
    white-space: pre-wrap; font-size: 12px; line-height: 1.55; color: var(--dim); font-weight: normal;
    box-shadow: 0 8px 28px rgba(0,0,0,.55); }
  .tip:hover .tippop, .tip:focus-within .tippop { display: block; }
  .tip.below .tippop { bottom: auto; top: calc(100% + 6px); }
  .tip.right .tippop { left: auto; right: 0; }
  .tip.term { gap: 0; cursor: help; }
  .tip.term > b, .tip.term > span.lbl { border-bottom: 1px dotted var(--dim); }
  .empty { color: var(--dim); padding: 40px; text-align: center; border: 1px dashed var(--border); border-radius: 8px; margin-top: 20px; }
  /* U8: statistical term with a native-title tooltip — dotted underline marks it hoverable, zero deps */
  .statterm { border-bottom: 1px dotted var(--dim); cursor: help; }
  /* metadata panel */
  .kv-row { display: grid; grid-template-columns: 200px 1fr; gap: 0 14px; padding: 2px 0; align-items: baseline; }
  @media (max-width: 900px) { .kv-row { grid-template-columns: 1fr; } }
  .mgroup { border-top: 1px dashed var(--border); margin-top: 10px; padding-top: 8px; }
  .mgroup:first-child { border-top: none; margin-top: 0; padding-top: 0; }
  .mgroup h4 { margin: 0 0 6px; font-size: 12px; color: var(--dim); font-weight: normal; text-transform: uppercase; letter-spacing: .05em; }
  .ann-ops { opacity: 0; transition: opacity 120ms; }
  .ann-row:hover .ann-ops, .ann-row:focus-within .ann-ops { opacity: 1; }
  .md-in { background: var(--panel2); border: 1px solid var(--border); color: var(--fg); font: inherit; font-size: 13px; padding: 3px 8px; border-radius: 6px; }
  .md-in:focus-visible { border-color: var(--accent); outline: none; }
  .md-in.bad { border-color: var(--err); }
  .md-err { color: var(--err); font-size: 12px; }
  @keyframes annflash { from { background: rgba(88,166,255,.12); } to { background: transparent; } }
  .ann-new { animation: annflash 400ms ease-out; }
  @media (prefers-reduced-motion: reduce) { .ann-ops { transition: none; } .ann-new { animation: none; } }
  .diff-hl { color: var(--warn); }
  tr.diff-row td:first-child { border-left: 3px solid var(--warn); }
  details { margin: 6px 0; } summary { cursor: pointer; color: var(--accent); }
  .diag { border-top: 1px dashed var(--border); margin-top: 10px; padding-top: 8px; }
  code.res { display: block; white-space: pre-wrap; word-break: break-word; background: var(--panel2); border-radius: 6px; padding: 10px; margin: 6px 0; font-size: 12px; max-height: 340px; overflow: auto; }
  /* experiment IA: focal "task runs" section label + collapsible deep-diagnostics section */
  .section-label { margin: 28px 0 2px; font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; }
  /* contextual entry links on the experiments page (skills rollup / upgrade verdicts — ex-tabs) */
  .subnav { display: flex; gap: 18px; margin: 2px 0 14px; font-size: 13px; }
  .diag-section { margin: 26px 0 6px; border-top: 1px solid var(--border); padding-top: 10px; }
  .diag-section > summary { list-style: none; color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; display: inline-flex; align-items: center; gap: 8px; }
  .diag-section > summary::-webkit-details-marker { display: none; }
  .diag-section > summary::before { content: '▸'; color: var(--dim); }
  .diag-section[open] > summary::before { content: '▾'; }
  .diag-section > summary:hover { color: var(--fg); }
  /* per-task run card: question/answer paired at the top so "what ran & how it looks" reads without expanding */
  .qa { display: grid; grid-template-columns: 20px 1fr; gap: 2px 10px; margin: 8px 0 10px; align-items: baseline; }
  .qa .tag { font-size: 11px; color: var(--dim); font-weight: 600; }
  .qa .qtext { font-size: 14px; line-height: 1.55; color: var(--fg); }
  .vbadges { display: flex; flex-wrap: wrap; gap: 6px; margin: 2px 0 4px; align-items: center; }
  /* Q-A overview (master-detail): color-coded question list (left) + reused task detail pane (right).
     hue is functional — red=wrong/low-quality → green=high-quality; a wrong answer (C=0) is forced red. */
  .qov-split { display: flex; gap: 16px; margin-top: 6px; align-items: flex-start; }
  .qov-list { flex: 0 0 340px; max-height: 78vh; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); position: sticky; top: 10px; }
  .qov-detail { flex: 1 1 auto; min-width: 0; }
  .qov-item { padding: 8px 10px 9px; border-left: 3px solid var(--border); border-bottom: 1px solid var(--border); cursor: pointer; }
  .qov-item:last-child { border-bottom: none; }
  .qov-item:hover { background: var(--panel2); }
  .qov-item.active { background: var(--panel2); box-shadow: inset 2px 0 0 var(--accent); }
  .qov-row1 { display: flex; align-items: center; gap: 8px; }
  .qov-glyph { font-weight: 700; width: 12px; text-align: center; flex: none; }
  .qov-score { font-variant-numeric: tabular-nums; font-weight: 600; width: 26px; text-align: right; flex: none; font-size: 12px; }
  .qov-label { flex: 1 1 auto; min-width: 0; font-size: 13px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qov-row2 { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 4px; font-size: 11px; align-items: center; }
  @media (max-width: 820px) { .qov-split { flex-direction: column; } .qov-list { flex: none; width: 100%; max-height: 42vh; position: static; } }
  /* reference-relationship charts (native ECharts): co-trigger graph / co-read heatmap / sankey */
  .rel-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px; }
  @media (max-width: 900px) { .rel-charts { grid-template-columns: 1fr; } }
  .rel-chart { height: 300px; width: 100%; }
  .searchbox { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font: inherit; font-size: 12px; width: 200px; }
  .searchbox:focus-visible { border-color: var(--accent); outline: none; }
  mark.hl { background: rgba(210,153,34,.4); color: var(--fg); border-radius: 2px; padding: 0 1px; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--ok); vertical-align: middle; margin: 0 4px; }
  .live-dot.pulse { animation: livepulse 1.2s ease-out; }
  @keyframes livepulse { from { box-shadow: 0 0 0 0 rgba(63,185,80,.6); } to { box-shadow: 0 0 0 8px rgba(63,185,80,0); } }
  @media (prefers-reduced-motion: reduce) { .live-dot.pulse { animation: none; } }
</style>
</head>
<body>
<header>
  <h1>aiide <span data-i18n="subtitle"></span></h1>
  <nav id="nav">
    <a href="#runs" data-view="runs" data-i18n="nav.runs"></a>
    <a href="#experiments" data-view="experiments" data-i18n="nav.experiments"></a>
  </nav>
  <input id="q" class="searchbox" type="search" autocomplete="off" oninput="applySearch()" onkeydown="searchKey(event)">
  <div class="lang" id="toolbar" style="margin-left:auto"></div>
  <div class="lang" id="lang"></div>
</header>
<main id="app"></main>
<script src="vendor/snapdom.min.js"></script>
<script type="module">
  // pure observability logic lives in a testable ES module (test/web-obs.test.js). Copy its
  // exports onto window so the classic script below can call them as bare globals. Module
  // scripts run before DOMContentLoaded, so these are ready by the time render() first fires.
  import * as OBS from './obs.js';
  Object.assign(window, OBS);
</script>

// ---- export (local-only: PNG via vendored snapdom, HTML as a self-contained static report) ----
function exportSlug() {
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}-${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}`;
  return `aiide-${(location.hash || '#runs').slice(1).replace(/[^\w.-]+/g, '_').slice(0, 80)}-${stamp}`;
}
async function exportPng() {
  const result = await snapdom(document.body, { backgroundColor: getComputedStyle(document.body).backgroundColor, scale: 1.5 });
  // NOT result.download(): snapdom revokes its blob URL right after click, which corrupts
  // the file when the browser asks where to save. A data: URL has no lifetime to race.
  const img = await result.toPng();
  triggerDownload(img.src, exportSlug() + '.png');
}
function exportHtml() {
  const doc = document.documentElement.cloneNode(true);
  doc.querySelectorAll('script, #toolbar, #lang, #q, button').forEach(el => el.remove());
  // static report: <details> stays natively expandable without any JS
  const html = '<!doctype html>\n<!-- exported by aiide (local, read-only snapshot) -->\n' + doc.outerHTML;
  triggerDownload(URL.createObjectURL(new Blob([html], { type: 'text/html' })), exportSlug() + '.html');
}
function triggerDownload(href, filename) {
  const a = document.createElement('a');
  a.href = href; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  // deliberately NOT revoking the blob URL: with "ask where to save" enabled the browser
  // reads the blob only after the user picks a location — early revoke corrupts the file.
  // The few KB per export are reclaimed when the tab closes.
}

// ---- S7 detail-panel: copy-JSON + persistent <details> collapse state ----
// copyPayload holds the raw record for the view currently on screen so the copy button needs
// no re-fetch. Read-only: copies to clipboard, never mutates anything.
const copyPayload = { run: null, exp: null };
async function clipboardWrite(text) {
  try { await navigator.clipboard.writeText(text); return; }
  catch { // clipboard API blocked (non-secure context) — fall back to a hidden textarea
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch { /* give up silently */ }
    ta.remove();
  }
}
async function copyJson(btn, kind) {
  const data = copyPayload[kind];
  if (!data) return;
  await clipboardWrite(JSON.stringify(data, null, 2));
  flashCopied(btn);
}
async function copyText(btn, text) { await clipboardWrite(text); flashCopied(btn); }
function flashCopied(btn) {
  if (btn.dataset.label == null) btn.dataset.label = btn.textContent;
  btn.textContent = '✓ ' + t('copy.done');
  clearTimeout(btn._flash);
  btn._flash = setTimeout(() => { btn.textContent = btn.dataset.label; }, 1400);
}

// <details data-persist="TYPE"> remembers open/closed per section TYPE (not per instance),
// so the preference carries across rounds and across runs (localStorage). One capture-phase
// listener (toggle does not bubble) records every change; applyPersistedDetails re-applies
// the stored preference after each render.
function detailPref(type) { return localStorage.getItem('aiide-det-' + type); }
document.addEventListener('toggle', (e) => {
  const el = e.target;
  if (el instanceof HTMLDetailsElement && el.dataset.persist)
    localStorage.setItem('aiide-det-' + el.dataset.persist, el.open ? '1' : '0');
}, true);
function applyPersistedDetails(root) {
  (root ?? document).querySelectorAll('details[data-persist]').forEach(el => {
    const pref = detailPref(el.dataset.persist);
    if (pref != null) el.open = pref === '1';
  });
}

  usd: x => '$' + (x ?? 0).toFixed(4),
  pct: x => ((x ?? 0) * 100).toFixed(0) + '%',
  t: s => s ? new Date(s).toLocaleString(lang === 'zh-hans' ? 'zh-CN' : undefined) : '—',
  esc: s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])),
};

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', () => { applyChrome(); render(); initLiveEvents(); });
window.addEventListener('resize', () => _charts.forEach(c => { try { c.resize(); } catch { /* disposed */ } }));
async function render() {
  const hash = location.hash || '#runs';
  const [view, ...parts] = hash.slice(1).split('/');
  const id = parts[0];
  disposeCharts(); // tear down any ECharts instances before a view replaces $app.innerHTML (no leak)
  document.querySelectorAll('#nav a').forEach(a =>
    // skills/upgrades are no longer top-level tabs — their sub-views (skill/skills/upgrade/upgrades/
    // upgrade-trend) now highlight Experiments, their contextual parent. routing is untouched.
    a.classList.toggle('active', a.dataset.view === view
      || (['run', 'search'].includes(view) && a.dataset.view === 'runs')
      || (['experiment', 'compare', 'skill', 'skills', 'upgrade', 'upgrades', 'upgrade-trend'].includes(view) && a.dataset.view === 'experiments')));
  try {
    if (view === 'runs') await viewRuns();
    else if (view === 'run') await viewRun(decodeURIComponent(id));
    else if (view === 'experiments') await viewExperiments();
    else if (view === 'experiment') await viewExperiment(decodeURIComponent(id));
    else if (view === 'compare') await viewCompare(decodeURIComponent(parts[0]), decodeURIComponent(parts[1] ?? ''));
    else if (view === 'search') await viewSearch(decodeURIComponent(parts.join('/')));
    else if (view === 'skills') await viewSkills();
    else if (view === 'skill') await viewSkill(decodeURIComponent(parts.join('/')));
    else if (view === 'upgrades') await viewUpgrades();
    else if (view === 'upgrade') await viewUpgrade(decodeURIComponent(parts.join('/')));
    else if (view === 'upgrade-trend') await viewUpgradeTrend();
    else location.hash = '#runs';
  } catch (e) {
    $app.innerHTML = '<div class="empty">' + t('load.failed') + ' ' + fmt.esc(e.message) + '</div>';
  }
  applySearch(); // re-apply any live list filter after the view (re)renders
}

// ---- S9 live-tail: EventSource → append new rounds (never a full re-render) ----
// One EventSource for the whole app (browser auto-reconnects on drop). Zero deps. On a `run`
// event we append only the rounds not yet in the DOM for the open run; the runs list gets a cheap
// refresh. If the server has no SSE endpoint or EventSource is missing, this degrades silently.
function initLiveEvents() {
  if (window.__es || typeof EventSource === 'undefined') return;
  let es;
  try { es = new EventSource('/api/events'); } catch { return; }
  window.__es = es;
  es.addEventListener('run', (e) => {
    let runId; try { runId = JSON.parse(e.data).runId; } catch { return; }
    const [view, id] = (location.hash || '#runs').slice(1).split('/');
    if (view === 'run' && decodeURIComponent(id ?? '') === runId) appendNewRounds(runId);
    else if (view === 'runs') viewRuns(); // list is not the append target — a cheap re-render is fine
  });
  es.onerror = () => { /* transient; EventSource reconnects on its own (retry hint from server) */ };
}
async function appendNewRounds(runId) {
  const cont = document.getElementById('timeline-items');
  if (!cont || cont.dataset.run !== runId) return;
  let run;
  try { ({ run } = await api('runs/' + encodeURIComponent(runId))); } catch { return; }
  const items = computeRunItems(run);
  const shown = cont.childElementCount; // one <details> per item, in order
  if (items.length <= shown) return;
  const tpl = document.createElement('template');
  tpl.innerHTML = items.slice(shown).map(it => it.kind === 'user' ? userRow(it.u) : roundRow(it.r)).join('');
  const added = [...tpl.content.children];
  cont.append(...added);
  applyPersistedDetails(cont);
  const dot = document.getElementById('live-dot');
  if (dot) { dot.hidden = false; dot.classList.remove('pulse'); void dot.offsetWidth; dot.classList.add('pulse'); }
}

// ---- S8 full-text search: client list filter + Ctrl/⌘+F + optional server body grep ----
// Ctrl/⌘+F focuses the box instead of the browser find (only when the box exists).
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && (e.key === 'f' || e.key === 'F')) {
    const q = document.getElementById('q');
    if (q) { e.preventDefault(); q.focus(); q.select(); }
  }
});
function searchKey(e) {
  if (e.key === 'Escape') { e.target.value = ''; applySearch(); e.target.blur(); return; }
  if (e.key === 'Enter') { // Enter dives into run *contents* via the read-only server grep
    const q = e.target.value.trim();
    if (q.length >= 2) location.hash = '#search/' + encodeURIComponent(q);
  }
}
// live client-side filter of the currently-rendered list; hides non-matching rows + highlights hits
function applySearch() {
  const box = document.getElementById('q');
  if (!box) return;
  const q = box.value.trim().toLowerCase();
  const view = (location.hash || '#runs').slice(1).split('/')[0];
  if (view !== 'runs' && view !== 'experiments') return;
  const body = $app.querySelector('tbody');
  if (!body) return;
  unmark(body);
  body.querySelectorAll('tr.click').forEach(tr => {
    const hit = !q || tr.textContent.toLowerCase().includes(q);
    tr.style.display = hit ? '' : 'none';
    if (q && hit) markText(tr, q);
  });
}
function unmark(root) {
  root.querySelectorAll('mark.hl').forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
}
// wrap case-insensitive matches of `needle` (already lowercased) in <mark> without touching
// element attributes or event handlers — only text nodes are split.
function markText(root, needle) {
  if (!needle) return;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: n => n.parentNode && n.parentNode.nodeName !== 'MARK' && n.nodeValue.toLowerCase().includes(needle)
      ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT,
  });
  const nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode);
  for (const node of nodes) {
    const frag = document.createDocumentFragment();
    const s = node.nodeValue, low = s.toLowerCase();
    let i = 0, idx;
    while ((idx = low.indexOf(needle, i)) >= 0) {
      if (idx > i) frag.appendChild(document.createTextNode(s.slice(i, idx)));
      const m = document.createElement('mark'); m.className = 'hl';
      m.textContent = s.slice(idx, idx + needle.length);
      frag.appendChild(m);
      i = idx + needle.length;
    }
    if (i < s.length) frag.appendChild(document.createTextNode(s.slice(i)));
    node.replaceWith(frag);
  }
}

// ---- view: full-text search results (read-only /api/search grep over run JSON) ----
async function viewSearch(q) {
  const hits = await api('search?q=' + encodeURIComponent(q));
  const hl = (snippet) => {
    const esS = fmt.esc(snippet), esQ = fmt.esc(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return esS.replace(new RegExp(esQ, 'ig'), m => `<mark class="hl">${m}</mark>`);
  };
  $app.innerHTML = `
    <p><a href="#runs">${t('back.runs')}</a></p>
    <h2 style="margin:6px 0">${t('search.title')} <span class="muted">${t('search.resultsFor')} “${fmt.esc(q)}” · ${hits.length}</span></h2>
    ${hits.length ? `<table><thead><tr><th>${t('th.run')}</th><th>${t('th.snippet')}</th></tr></thead><tbody>
      ${hits.map(h => `<tr class="click" onclick="location.hash='#run/${encodeURIComponent(h.runId)}'">
        <td><a>${fmt.esc(String(h.runId).slice(0, 8))}…</a></td>

    </tbody></table>` : `<div class="empty">${t('search.empty')} “${fmt.esc(q)}”</div>`}`;
}

// skill score trend over time: points are experiments (x=chronological, y=composite). Trend lines
// connect ONLY within a comparability cohort (suite·model·runtime) — cross-cohort points are NOT
// joined (a line would be a false apples-to-apples claim); each cohort gets its own colour. Null
// composites render as hollow baseline markers; a hash change gets a ringed, larger point.
function skillCohortKey(e) { return `${(e.suiteSha ?? '—').slice(0, 8)}·${e.model}·${e.runtime}`; }
function skillTrendChart(experiments) {
  const pts = experiments.map((e, i) => ({ ...e, i }));
  if (!pts.length) return '<span class="muted">' + t('chart.noData') + '</span>';
  const W = 520, H = 170, padL = 26, padR = 10, padT = 14, padB = 26;
  const n = pts.length;
  const x = i => n === 1 ? W / 2 : padL + i / (n - 1) * (W - padL - padR);
  const y = v => padT + (1 - v) * (H - padT - padB);
  const palette = ['var(--accent)', 'var(--purple)', 'var(--cyan)', 'var(--warn)', 'var(--ok)'];
  const cohorts = [...new Set(pts.map(skillCohortKey))];
  let svg = '';
  for (const g of [0, 0.5, 1]) svg += `<line x1="${padL}" y1="${y(g)}" x2="${W - padR}" y2="${y(g)}" stroke="var(--border)" stroke-dasharray="2 3"/><text x="2" y="${y(g) + 3}" fill="var(--dim)" font-size="9">${g}</text>`;
  cohorts.forEach((ck, ci) => {
    const color = palette[ci % palette.length];
    const cp = pts.filter(p => skillCohortKey(p) === ck && p.composite != null);
    if (cp.length > 1) svg += `<polyline points="${cp.map(p => `${x(p.i)},${y(p.composite)}`).join(' ')}" fill="none" stroke="${color}" stroke-width="2" opacity="0.85"/>`;
  });
  pts.forEach((p, idx) => {
    const color = palette[cohorts.indexOf(skillCohortKey(p)) % palette.length];
    const hashChanged = idx > 0 && pts[idx - 1].hash !== p.hash;
    if (p.composite == null) {
      svg += `<circle cx="${x(p.i)}" cy="${H - padB}" r="3" fill="none" stroke="var(--dim)"><title>${fmt.esc(p.id)}: ${t('na')}</title></circle>`;
    } else {
      svg += `<circle cx="${x(p.i)}" cy="${y(p.composite)}" r="${hashChanged ? 5 : 3.5}" fill="${color}"${hashChanged ? ' stroke="var(--fg)" stroke-width="1.5"' : ''}><title>${fmt.esc(p.id)} · ${fmt.esc((p.hash ?? '').slice(0, 6))} · ${p.composite}${hashChanged ? ' · ' + t('skill.hashChange') : ''}</title></circle>`;
    }
  });
  const legend = cohorts.map((ck, ci) => `<span class="dot" style="background:${palette[ci % palette.length]}"></span><span class="muted">${fmt.esc(ck)}</span>`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">${svg}</svg><div class="legend" style="margin-top:4px">${legend}</div>`;
}

// ---- view: run detail (round-by-round) ----
async function viewRun(id) {
  const { run, metrics } = await api('runs/' + encodeURIComponent(id));
  copyPayload.run = { run, metrics };
  const tt = metrics.totals;

  // read-only summary of the owning experiment's meta/captured (R4.10) — chips are optional context
  let expChips = '';
  if (run.meta?.experimentId) {
    try {
      const e = await api('experiments/' + encodeURIComponent(run.meta.experimentId));
      const bits = [
        ...Object.entries(e.meta ?? {}).map(([k, m]) => `${k}=${m.value}`),
        ...Object.entries(e.captured ?? {}).map(([k, c]) => (c.value == null ? `${k} ✗` : `${k}=${c.value}`)),
      ];
      if (bits.length) expChips = ' · ' + bits.map(b => `<span class="badge">${fmt.esc(b)}</span>`).join('');
    } catch { /* experiment file gone — chips stay empty */ }
  }

  // chat-flow timeline: interleave user-side events with assistant rounds, attributing each
  // round's context growth to what entered context (shared with the live-tail append path)
  const items = computeRunItems(run);
  // S16: per-round stacked attribution (uses the _attr just computed) + deterministic loop scan
  const attrStack = stackSeries(run.rounds);
  // threshold N is configurable (localStorage aiide-loop-n), default 4 — high enough that a
  // normal trace stays silent; only a genuine rabbit-hole crosses it.
  const loopN = Math.max(2, parseInt(localStorage.getItem('aiide-loop-n') ?? '4', 10) || 4);
  const loops = detectLoops(run.rounds, loopN);

  $app.innerHTML = `
    <p><a href="#runs">${t('back.runs')}</a></p>
    <h2 style="margin:6px 0">${fmt.esc(run.id)} <button class="btn" title="${t('copy.jsonTip')}" onclick="copyJson(this,'run')">⧉ ${t('copy.json')}</button></h2>
    <div class="muted">${fmt.esc(run.model ?? '')} · ${fmt.t(run.startedAt)} · ${fmt.esc(run.source)}${run.meta?.experimentId ? ` · <a href="#experiment/${encodeURIComponent(run.meta.experimentId)}">${fmt.esc(run.meta.taskId)} r${run.meta.repeat}</a>` : ''}${expChips}</div>
    ${run.prompt ? `<div class="panel"><h3>${t('panel.prompt')}</h3><code class="res">${fmt.esc(run.prompt)}</code></div>` : ''}
    <div class="cards">
      ${card(tt.rounds, t('th.rounds'))}${card(fmt.ms(tt.durationMs), t('card.duration'))}
      ${card(fmt.n(tt.tokens.in + tt.tokens.out), t('card.inOutTokens'))}
      ${card(fmt.n(tt.tokens.cacheR), term(t('card.cacheRead'), t('tip.cacheR'), 'below'))}
      ${card(fmt.usd(tt.costUsd), t('card.estCost'))}
      ${card(fmt.n(metrics.peakContext), term(t('card.peakContext'), t('tip.ctx'), 'below'))}
      ${card(tt.toolErrors, t('card.toolErrors'))}
    </div>
    ${loopBanner(loops)}
    <div class="grid2">
      <div class="panel"><h3>${t('panel.contextPerRound')}</h3>${sparkline(metrics.contextSeries.map(c => c.footprint), metrics.contextLimit)}</div>
      <div class="panel"><h3>${t('panel.outputPerRound')}</h3>${barChart(run.rounds.map(r => r.usage.out))}</div>
    </div>
    ${attrStack.length ? `<div class="panel"><h3>${t('panel.attrStack')}</h3>${stackedAttrChart(attrStack)}
      <div class="legend" style="margin-top:6px">
        <span class="dot" style="background:var(--accent)"></span><b>${t('round.prevOut')}</b>
        <span class="dot" style="background:var(--cyan)"></span><b>${t('round.toolResults')}</b>
        <span class="dot" style="background:var(--purple)"></span><b>${t('round.injected')}</b>
        <span class="dot" style="background:var(--dim)"></span><b>${t('round.unattributed')}</b>
        <span class="dot" style="background:var(--ok)"></span><b>${t('attr.compaction')}</b>
      </div></div>` : ''}
    ${Object.keys(metrics.perSkill).length ? `<div class="panel"><h3>${t('panel.perSkill')}</h3>
      <table><thead><tr><th>${t('th.skill')}</th><th>${t('th.rounds')}</th><th>${t('th.tokensInOut')}</th><th>${t('th.time')}</th><th>${t('th.toolCalls')}</th><th>${t('th.errors')}</th></tr></thead><tbody>
      ${Object.entries(metrics.perSkill).map(([k, s]) => `<tr><td><span class="badge skill">${fmt.esc(k)}</span></td><td>${s.rounds}</td><td>${fmt.n(s.tokens.in)} / ${fmt.n(s.tokens.out)}</td><td>${fmt.ms(s.durationMs)}</td><td>${s.toolCalls}</td><td>${s.toolErrors || '<span class="muted">0</span>'}</td></tr>`).join('')}
      </tbody></table></div>` : ''}
    <div class="panel"><h3>${t('panel.timeline')} <span id="live-dot" class="live-dot" hidden title="${t('live.on')}"></span>
        <button class="btn" onclick="toggleRounds(true)">${t('timeline.expandAll')}</button>
        <button class="btn" onclick="toggleRounds(false)">${t('timeline.collapseAll')}</button></h3>
      <div id="timeline-items" data-run="${fmt.esc(run.id)}">${items.map(it => it.kind === 'user' ? userRow(it.u) : roundRow(it.r)).join('')}</div>
    </div>
    ${run.sidechains.length ? `<div class="panel"><h3>${t('panel.sidechains')}</h3>
      ${run.sidechains.map(sc => `<div class="muted">${t('sidechain.agent')}: ${fmt.esc(sc.agentId)} — ${sc.rounds.length} ${t('sidechain.rounds')}</div>${sc.rounds.map(r => roundRow(r)).join('')}`).join('')}
    </div>` : ''}`;
  applyPersistedDetails($app);
}

function userRow(u) {
  const preview = u.text.replace(/\s+/g, ' ').slice(0, 110);
  const isAtt = u.kind === 'attachment';
  return `<details class="round user-turn" ${isAtt ? 'style="opacity:.75"' : ''}>
    <summary><span class="badge ${isAtt ? '' : 'ok'}">${t(isAtt ? 'user.attachment' : 'user.msg')}</span> <span class="muted">${fmt.esc(preview)}${u.text.length > 110 ? '…' : ''} · ${fmt.n(u.chars)} ${t('user.chars')} (≈${fmt.n(Math.round(u.chars / 4))} tokens)</span></summary>
    <div class="round-body"><code class="res">${fmt.esc(u.text)}</code></div>
  </details>`;
}

function toggleRounds(open) { document.querySelectorAll('details.round').forEach(d => { d.open = open; }); }

function roundRow(r) {
  const u = r.usage;
  const ctxTotal = u.in + u.cacheR + u.cacheW;
  const delta = r._delta;
  const seg = (v, color, label) => (v > 0 && ctxTotal > 0)
    ? `<div title="${label}: ${fmt.n(v)}" style="width:${Math.max(0.5, v / ctxTotal * 100)}%;background:${color}"></div>` : '';
  return `<details class="round ${r.attributionSkill ? 'skill-round' : ''}" data-persist="round">
    <summary>
      <b>#${r.seq}</b>
      ${r.attributionSkill ? `<span class="badge skill">${fmt.esc(r.attributionSkill)}</span>` : ''}
      ${(r.declaredTriggers?.length || r.declaredRefReads?.length) ? `<span class="badge warn" title="本轮含 adapter 自报信号（declaredTriggers/declaredRefReads）${r.declaredTriggers?.length ? '：' + r.declaredTriggers.map(s => fmt.esc(s)).join(', ') : ''}">自报</span>` : ''}
      ${r.toolCalls.map(tc => `<span class="badge ${tc.isError ? 'err' : ''}">${fmt.esc(tc.name)}${tc.skill ? ':' + fmt.esc(tc.skill) : ''}${tc.isError ? ' ✗' : ''}</span>`).join('')}
      <span class="muted" style="float:right">${fmt.ms(r.durationMs)} · ${term(t('round.ctx') + ' ' + fmt.n(r.contextFootprint), t('tip.ctx'), 'right')}${delta != null ? ` ${term(`<b style="color:${deltaSignificant(delta, r.contextFootprint) ? (delta > 0 ? 'var(--warn)' : 'var(--ok)') : 'var(--dim)'}">(${delta >= 0 ? '+' : ''}${fmt.n(delta)})</b>`, t('tip.delta'), 'right')}` : ''} · ${term(t('round.out') + ' ' + fmt.n(u.out), t('tip.out'), 'right')}</span>
    </summary>
    <div class="round-body">
      ${r.seq === 1 ? `<div class="muted" style="margin-bottom:6px">💡 ${t('round.firstNote')}</div>` : ''}
      ${r._attr ? (() => {
        // S4: contribution buckets in descending order (what changed & mattered goes first);
        // `other` is a reconciliation residual (±), rendered separately — a negative residual at
        // a compaction/cache-eviction boundary must never masquerade as a positive bucket.
        const { buckets, residual, compactionKind } = attrContributions(r._attr);
        const lbl = { prevOut: 'round.prevOut', toolRes: 'round.toolResults', injected: 'round.injected',
          injectedUser: 'round.injectedUser', injectedHarness: 'round.injectedHarness', skillBody: 'round.skillBody' };
        const parts = buckets.map(b => `<b>${t(lbl[b.key])}</b> ≈${fmt.n(b.val)}`).join(' · ');
        const resTxt = `<b>${t('round.unattributed')}</b> ${residual >= 0 ? '+' : '−'}${fmt.n(Math.abs(residual))}`;
        // tagged run, negative residual: the tooltip says whether the shrink is a parser-confirmed
        // compact boundary or only inferred from the sign — rendering itself is unchanged
        return `<div class="legend" style="margin:0 0 6px">${t('round.entered')} (${delta >= 0 ? '+' : ''}${fmt.n(delta)}):
          ${parts} · ${term(resTxt, compactionKind ? t('tip.compact.' + compactionKind) : t('tip.delta'))}</div>`;
      })() : ''}
      <div class="seg-bar">
        ${seg(u.in, 'var(--accent)', t('round.freshIn'))}${seg(u.cacheR, 'var(--cyan)', t('round.cacheR'))}${seg(u.cacheW, 'var(--warn)', t('round.cacheW'))}
      </div>
      <div class="legend">
        <span class="dot" style="background:var(--accent)"></span>${term(`<b>${t('round.freshIn')}</b>`, t('tip.freshIn'))} ${fmt.n(u.in)}
        <span class="dot" style="background:var(--cyan)"></span>${term(`<b>${t('round.cacheR')}</b>`, t('tip.cacheR'))} ${fmt.n(u.cacheR)}
        <span class="dot" style="background:var(--warn)"></span>${term(`<b>${t('round.cacheW')}</b>`, t('tip.cacheW'))} ${fmt.n(u.cacheW)}
        <span class="dot" style="background:var(--ok)"></span>${term(`<b>${t('round.out')}</b>`, t('tip.out'))} ${fmt.n(u.out)}
      </div>
      ${r.thinking ? `<details data-persist="thinking"><summary class="muted">${t('round.thinking')} (${fmt.n(r.thinkingChars)} chars)</summary><code class="res">${fmt.esc(r.thinking)}</code></details>` : ''}
      ${r.text ? `<div class="muted">${t('round.text')}:</div><code class="res">${fmt.esc(r.text)}</code>`
        : (!r.toolCalls.length ? `<div class="muted">${t('round.noContent')}</div>` : '')}
      ${r.toolCalls.map(tc => `
        <div class="tool-block">
          <div class="th"><b>${fmt.esc(tc.name)}</b>${tc.skill ? ` · <span class="badge skill">${fmt.esc(tc.skill)}</span>` : ''}${tc.isError ? ` <span class="badge err">✗ error</span>` : ''}</div>
          <div class="tb">
            ${tc.input != null ? `<div class="muted">${t('round.toolInput')}:</div><code class="res">${fmt.esc(typeof tc.input === 'string' ? tc.input : JSON.stringify(tc.input, null, 2))}</code>` : ''}
            ${tc.result != null ? `<div class="muted">${t('round.toolResult')}:</div><code class="res">${fmt.esc(tc.result)}</code>` : ''}
          </div>
        </div>`).join('')}
    </div>
  </details>`;
}

function pickCompare(id) {
  const first = sessionStorage.getItem('aiide-cmp');
  if (!first) { sessionStorage.setItem('aiide-cmp', id); render(); return; }
  sessionStorage.removeItem('aiide-cmp');
  if (first === id) { render(); return; }
  location.hash = `#compare/${encodeURIComponent(first)}/${encodeURIComponent(id)}`;
}

// ---- view: side-by-side experiment comparison ----
async function viewCompare(idA, idB) {
  const [a, b] = await Promise.all([api('experiments/' + encodeURIComponent(idA)), api('experiments/' + encodeURIComponent(idB))]);
  const taskIds = [...new Set([...Object.keys(a.tasks), ...Object.keys(b.tasks)])];
  const upgrades = await api('upgrades').catch(() => []); // Part C: picker to embed a real cohort report
  const d3 = v => v == null ? t('na') : v.toFixed(3);
  const num = (raw, txt) => ({ raw, txt });
  // Δ (B−A) cell: honest point delta, colored by whether it improved (better='high'→up good; 'low'→down good).
  const dCell = (ra, rb, better, sig = '') => {
    if (ra == null || rb == null) return '<td></td>';
    const d = rb - ra;
    const good = d === 0 ? null : better === 'low' ? d < 0 : better === 'high' ? d > 0 : null;
    const col = good == null ? 'var(--dim)' : good ? 'var(--ok)' : 'var(--err)';
    const mag = Math.abs(d) < 1 ? d.toFixed(3) : Math.abs(d) < 1000 ? d.toFixed(1) : String(Math.round(d));
    const v = d === 0 ? '±0' : (d > 0 ? '+' : '') + mag;
    return `<td style="color:${col};white-space:nowrap">${v}${sig ? ' ' + sig : ''}</td>`;
  };
  const row = (label, fa, fb, better, sig = '') => {
    const va = fa(), vb = fb();
    const hl = (x, y) => (better && x != null && y != null && x !== y)
      ? (better === 'high' ? (x > y) : (x < y)) ? 'style="color:var(--ok)"' : 'style="color:var(--dim)"' : '';
    return `<tr><td class="muted">${label}</td><td ${hl(va?.raw, vb?.raw)}>${va?.txt ?? va}</td><td ${hl(vb?.raw, va?.raw)}>${vb?.txt ?? vb}</td>${dCell(va?.raw, vb?.raw, better, sig)}</tr>`;
  };
  // improved/regressed/flat tally over per-task composite deltas (higher = better)
  const tally = deltaTally(taskIds.map(tid => {
    const ta = a.tasks[tid], tb = b.tasks[tid];
    return (ta?.composite != null && tb?.composite != null) ? tb.composite - ta.composite : null;
  }));
  // Phase 2: a full report builds live whenever the two experiments SHARE tasks (paired by task-id).
  // Quality (C/L1/L2/L3) + reference relationship are comparable even across runtimes; when runtime/model
  // differ (cohortComparable=false) the cost/H axes are cross-runtime → the banner says so. verdict gates
  // MIN_PAIRS itself, so <8 shared tasks honestly shows insufficient-data.
  const sharedTasks = Object.keys(a.tasks).filter(id => id in b.tasks);
  const canGenerate = sharedTasks.length >= 1;
  const crossRuntime = !cohortComparable(a, b).comparable;
  _cmpPair = { idA, idB, canGenerate, crossRuntime };
  $app.innerHTML = `
    <p><a href="#experiments">${t('back.experiments')}</a></p>
    <h2 style="margin:6px 0">${t('compare.title')}</h2>
    ${causalCompareRow(a, b)}
    <div class="panel">
      <b>${t('cmp.reportTitle')}</b>
      ${canGenerate ? `<span class="badge ok" style="margin-left:8px">${t('cmp.autoLive')}</span>${crossRuntime ? ` <span class="badge warn">${t('cmp.crossRt')}</span>` : ''}` : `<span class="muted" style="margin-left:8px">${t('cmp.notComparable')}</span>`}
      ${upgrades.length
        ? `<select class="md-in" style="margin-left:8px" onchange="onCmpReportPick(this.value)">
             <option value="">${comparable ? t('cmp.useDynamic') : t('cmp.pickReport')}</option>
             ${upgrades.map(u => `<option value="${fmt.esc(u.compareId)}">${fmt.esc(u.arms?.new ?? '?')} vs ${fmt.esc(u.arms?.old ?? '?')} · ${fmt.t(u.createdAt)}</option>`).join('')}
           </select>`
        : ''}
      <p class="muted" style="font-size:12px;margin:6px 0 0">${t('cmp.reportNote')}</p>
    </div>
    <div id="cmp-report"></div>
    <div class="muted" style="margin:12px 0 2px">${t('cmp.tally')}: <span style="color:var(--ok)">${tally.improved} ${t('cmp.improved')}</span> · <span style="color:var(--err)">${tally.regressed} ${t('cmp.regressed')}</span> · ${tally.flat} ${t('cmp.flat')}</div>
    <table><thead><tr><th>${t('compare.metric')}</th>
      <th class="cmp-a">${fmt.esc(a.suiteName)} · ${fmt.esc(a.model)}<br><span class="muted">${fmt.t(a.createdAt)} · ${fmt.esc(a.runtime ?? 'claude-code')}</span></th>
      <th class="cmp-b">${fmt.esc(b.suiteName)} · ${fmt.esc(b.model)}<br><span class="muted">${fmt.t(b.createdAt)} · ${fmt.esc(b.runtime ?? 'claude-code')}</span></th>
      <th>${t('cmp.delta')}</th></tr></thead>
    <tbody>
      ${row('SkillScore', () => num(a.summary.composite, d3(a.summary.composite)), () => num(b.summary.composite, d3(b.summary.composite)), 'high')}
      ${['C', 'P', 'R', 'H'].map(k => row(t('card.' + k), () => num(a.summary[k], d3(a.summary[k])), () => num(b.summary[k], d3(b.summary[k])), 'high')).join('')}
      ${taskIds.map(tid => {
        const ta = a.tasks[tid], tb = b.tasks[tid];
        // 1-vs-1 significance flag: two Wilson CIs don't overlap (honest, low-authority — not a cohort verdict)
        const sig = wilsonCisDisjoint(ta?.wilsonCi, tb?.wilsonCi)
          ? `<span class="badge warn" title="${t('cmp.ciDisjointTip')}">${t('cmp.ciDisjoint')}</span>` : '';
        return `
          <tr><td colspan="4" style="background:var(--panel2)">
            <details><summary style="cursor:pointer"><b>${fmt.esc(tid)}</b> <span class="muted" style="font-size:11px">▸ ${t('compare.showQuestion')}</span></summary>
              <div class="muted" style="margin-top:6px;white-space:pre-wrap">${fmt.esc(ta?.prompt ?? tb?.prompt ?? '')}</div>
            </details></td></tr>
          ${row(t('th.composite'), () => num(ta?.composite, d3(ta?.composite)), () => num(tb?.composite, d3(tb?.composite)), 'high')}
          ${row(t('card.successRate'), () => num(ta?.successRate, ta ? fmt.pct(ta.successRate) + ` <span class="muted">CI[${ta.wilsonCi.lo.toFixed(2)},${ta.wilsonCi.hi.toFixed(2)}]</span>` : t('na')), () => num(tb?.successRate, tb ? fmt.pct(tb.successRate) + ` <span class="muted">CI[${tb.wilsonCi.lo.toFixed(2)},${tb.wilsonCi.hi.toFixed(2)}]</span>` : t('na')), 'high', sig)}
          ${row(t('card.activation'), () => num(ta?.activationRate, ta?.activationRate == null ? t('na') : fmt.pct(ta.activationRate)), () => num(tb?.activationRate, tb?.activationRate == null ? t('na') : fmt.pct(tb.activationRate)), 'high')}
          ${row(t('th.time'), () => num(ta?.efficiency.meanDurationMs, ta ? fmt.ms(ta.efficiency.meanDurationMs) : t('na')), () => num(tb?.efficiency.meanDurationMs, tb ? fmt.ms(tb.efficiency.meanDurationMs) : t('na')), 'low')}
          ${row(t('card.estCost'), () => num(ta?.efficiency.meanCostUsd, ta ? fmt.usd(ta.efficiency.meanCostUsd) : t('na')), () => num(tb?.efficiency.meanCostUsd, tb ? fmt.usd(tb.efficiency.meanCostUsd) : t('na')), 'low')}
        `;
      }).join('')}
    </tbody></table>
    ${metadataDiffPanel(a, b)}
    ${runtimeInfoDiffPanel(a, b)}
    ${!cohortComparable(a, b).comparable || (a.service?.endpointHost ?? null) !== (b.service?.endpointHost ?? null)
      ? `<p class="muted" style="border-left:3px solid var(--warn);padding-left:10px">${t('compare.crossRuntime')}</p>` : ''}
    <p class="muted">${t('compare.caveat')}</p>`;
  if (canGenerate) renderDynamicCompare(idA, idB, crossRuntime); // Phase 2: auto-build the full report live
}

let _cmpPair = null; // {idA, idB, comparable} for the picker's "back to live" option

// Shared embed: render a report (dynamic or a pre-run cohort report) into #cmp-report with a framing
// banner + native relationship charts. `dynamic` → the "generated live" banner; else the cohort frame.
function embedUpgradeReport(box, report, { dynamic = false, crossRuntime = false } = {}) {
  const v = buildUpgradeView(report);
  if (!v) { box.innerHTML = `<div class="empty">${t('load.failed')}</div>`; return; }
  const fullHtml = dynamic && _cmpPair ? `/api/compare/${encodeURIComponent(_cmpPair.idA)}/${encodeURIComponent(_cmpPair.idB)}/report.html` : null;
  const banner = dynamic
    ? `<div class="panel" style="border-left:3px solid var(--accent)">${t('cmp.dynamicFrame')}${crossRuntime ? `<br><span style="color:var(--warn)">⚠ ${t('cmp.crossRtNote')}</span>` : ''}${fullHtml ? `<div style="margin-top:6px"><a href="${fullHtml}" target="_blank" rel="noopener">⬇ ${t('cmp.openFullHtml')} ↗</a></div>` : ''}</div>`
    : `<div class="panel" style="border-left:3px solid var(--accent)">${t('cmp.cohortFrame')} <code>${fmt.esc(report.cohort ?? report.compareId ?? '')}</code></div>`;
  box.innerHTML = banner + upgradeReportHtml(v, report);
  applyPersistedDetails(box);
  initRelationshipCharts(report.depgraph);
}

// Phase 2: full report built live from the two experiments (no `aiide upgrade` run needed).
async function renderDynamicCompare(idA, idB, crossRuntime = false) {
  const box = document.getElementById('cmp-report');
  if (!box) return;
  disposeCharts();
  box.innerHTML = `<div class="muted">…</div>`;
  try { embedUpgradeReport(box, await api(`compare/${encodeURIComponent(idA)}/${encodeURIComponent(idB)}/report`), { dynamic: true, crossRuntime }); }
  catch (e) { box.innerHTML = `<div class="empty">${t('load.failed')} ${fmt.esc(e.message)}</div>`; }
}

// Part C: embed a REAL pre-run cohort upgrade report (honest cohort frame). Reuses embedUpgradeReport.
async function renderCmpReport(compareId) {
  const box = document.getElementById('cmp-report');
  if (!box) return;
  disposeCharts();
  box.innerHTML = `<div class="muted">…</div>`;
  try { embedUpgradeReport(box, await api('upgrades/' + encodeURIComponent(compareId)), { dynamic: false }); }
  catch (e) { box.innerHTML = `<div class="empty">${t('load.failed')} ${fmt.esc(e.message)}</div>`; }
}

// picker: a value → that pre-run cohort report; empty → back to the live dynamic report (if comparable) else clear.
function onCmpReportPick(value) {
  const box = document.getElementById('cmp-report');
  if (value) return void renderCmpReport(value);
  if (_cmpPair?.canGenerate) return void renderDynamicCompare(_cmpPair.idA, _cmpPair.idB, _cmpPair.crossRuntime);
  if (box) { disposeCharts(); box.innerHTML = ''; }
}

// §4 runtime 自述 diff — descriptor diff (name/version/prompt sha/tools 增删) rendered ALONGSIDE the
// metric table above, framed by the mandated concurrent-factors sentence: these are 同期变更的
// 环境因素, juxtaposed with the metric deltas, NEVER a causal attribution (no 因果 wording anywhere,
// test-banned). One side without runtime_info → the honest 无 runtime 自述 placeholder row; neither
// side → no section at all (absence already shows on each experiment's own environment card).
function runtimeInfoDiffPanel(a, b) {
  const d = runtimeInfoDiff(a.environment ?? {}, b.environment ?? {});
  if (!d) return '';
  const head = `<div class="panel"><h3>runtime 自述对比 <span class="muted" style="font-size:12px">（runtime_info descriptor diff）</span></h3>
    <p class="muted" style="font-size:12px;border-left:3px solid var(--dim);padding-left:10px">${fmt.esc(d.framing)}</p>`;
  if (d.oneSided) {
    // one-sided: name the side WITHOUT a self-description; no descriptor diff is fabricated
    return `${head}<div class="muted">${d.side === 'A' ? 'A' : 'B'} 侧：${fmt.esc(d.placeholder)}（no runtime_info）——无法做描述符 diff；另一侧的自述见其实验详情页环境卡</div></div>`;
  }
  const cell = (txt, hl) => `<td class="${hl ? 'diff-hl' : 'muted'}">${txt}</td>`;
  const row = (k, va, vb, changed) => `<tr${changed ? ' class="diff-row"' : ''}><td class="muted">${k}</td>${cell(va, changed)}${cell(vb, changed)}</tr>`;
  const sp = d.systemPrompt;
  const spCell = (sha, bytes) => sha ? `<code>${fmt.esc(sha)}</code>${bytes != null ? ` · ${fmt.n(bytes)} B` : ''}` : fmt.esc(RUNTIME_INFO_FIELD_ABSENT.systemPrompt);
  const spRow = sp
    ? row(`system prompt <span class="muted">${sp.changed ? '（sha 变了）' : '（sha 未变）'}</span>`,
        spCell(sp.shaShortA, sp.bytesA),
        spCell(sp.shaShortB, sp.bytesB) + (sp.changed && sp.bytesDelta != null ? ` <span class="muted">（bytes Δ ${sp.bytesDelta >= 0 ? '+' : ''}${fmt.n(sp.bytesDelta)}）</span>` : ''),
        sp.changed)
    : row('system prompt', fmt.esc(RUNTIME_INFO_FIELD_ABSENT.systemPrompt), fmt.esc(RUNTIME_INFO_FIELD_ABSENT.systemPrompt), false);
  // tools 增/删/不变 — unknowable when a side did not self-describe its list (never a fake empty diff)
  const tl = d.tools;
  const toolsChanged = !tl.unknown && (tl.added.length > 0 || tl.removed.length > 0);
  const toolsBody = tl.unknown
    ? '<span class="muted">一侧未自述工具清单——增删不可知（not reported）</span>'
    : [
        tl.added.length ? `<span style="color:var(--ok)">＋ ${tl.added.map(fmt.esc).join('，')}</span>` : '',
        tl.removed.length ? `<span style="color:var(--err)">－ ${tl.removed.map(fmt.esc).join('，')}</span>` : '',
        `<span class="muted">不变（unchanged）${tl.unchanged.length} 个${tl.unchanged.length ? '：' + tl.unchanged.map(fmt.esc).join('，') : ''}</span>`,
      ].filter(Boolean).join(' · ');
  return `${head}
    <table><thead><tr><th>维度（descriptor）</th><th class="cmp-a">A</th><th class="cmp-b">B</th></tr></thead><tbody>
      ${row('name', fmt.esc(d.name.a ?? '—'), fmt.esc(d.name.b ?? '—'), d.name.changed)}
      ${row('version', fmt.esc(d.version.a ?? '—'), fmt.esc(d.version.b ?? '—'), d.version.changed)}
      ${spRow}
      <tr${toolsChanged ? ' class="diff-row"' : ''}><td class="muted">tools</td><td colspan="2" class="${toolsChanged ? 'diff-hl' : 'muted'}">${toolsBody}</td></tr>
    </tbody></table>
  </div>`;
}

// S15: skill-version causal row at the top of compare. "⇒" (attributable) is gated on a strict
// comparability cohort — same suite bytes + model + runtime AND exactly one skill hash changed;
// otherwise the delta is correlational. The within-noise caveat appears only when the delta is
// backed by no significant task movement (all Wilson CIs still overlap). Read-only.
function causalCompareRow(a, b) {
  const deltas = skillHashDeltas(a, b);
  if (!deltas.length) return ''; // no skill changed → no variable to attribute, no row
  const gate = cohortComparable(a, b);
  const causal = gate.comparable && deltas.length === 1;
  const sg = (x, dp) => (x >= 0 ? '+' : '') + x.toFixed(dp);
  // Wave 1: a composite can be null (all-excluded / floor breach) — a delta against null is
  // meaningless, so show n/a rather than treating null as 0 and inventing a change.
  const cA = a.summary?.composite, cB = b.summary?.composite;
  const dComp = (cA != null && cB != null) ? cB - cA : null;
  const dC = (a.summary?.C != null && b.summary?.C != null) ? b.summary.C - a.summary.C : null;
  const actA = meanActivation(a), actB = meanActivation(b);
  const dAct = (actA != null && actB != null) ? (actB - actA) * 100 : null;
  const extras = [dC != null ? `C ${sg(dC, 2)}` : null, dAct != null ? `activation ${sg(dAct, 0)}pp` : null].filter(Boolean).join(' · ');
  const score = `SkillScore ${dComp == null ? t('na') : sg(dComp, 3)}${extras ? ` <span class="muted">(${extras})</span>` : ''}`;
  const noise = causal && dComp != null && causalWithinNoise(a, b) ? ` <span class="badge warn">${t('causal.withinNoise')}</span>` : '';
  const skillList = deltas.map(d =>
    `<span class="badge skill">${fmt.esc(d.name)}</span> <span class="muted">${fmt.esc((d.hashA ?? '—').slice(0, 6))}→${fmt.esc((d.hashB ?? '—').slice(0, 6))}</span>`).join(' , ');
  const body = causal
    ? `${skillList} <span style="color:var(--accent);font-weight:bold"> ⇒ </span> ${score}${noise}`
    : `${skillList} <span class="muted"> — ${t('causal.correlational')}${deltas.length > 1 ? ' (' + t('causal.multiSkill') + ')' : ''}${gate.reasons.length ? ': ' + gate.reasons.map(r => t('causal.reason.' + r)).join(', ') : ''}</span> ${score}`;
  return `<div class="panel"><h3>${t('causal.title')}</h3><div>${body}</div></div>`;
}
