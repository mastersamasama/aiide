// One compact row in the question list. Color (border + glyph + score) is the hue from buildQuestionList:
// red=wrong/low-quality → green=high-quality; null hue (no data) → neutral. Click swaps the detail pane.
function qovItem(q) {
  const col = q.hue == null ? 'var(--dim)' : `hsl(${q.hue} 65% 52%)`;
  const glyph = q.verdict === 'pass' ? '✓' : q.verdict === 'fail' ? '✗' : q.verdict === 'partial' ? '◐' : '–';
  const score = q.composite == null ? '–' : Math.round(q.composite * 100);
  const bits = [];
  if (q.skill) bits.push(`<span class="badge skill">${fmt.esc(q.skill)}</span>`);
  bits.push(`<span class="muted">${t('qov.success')} ${q.successRate == null ? t('na') : fmt.pct(q.successRate)}</span>`);
  bits.push(`<span class="muted">${t('qov.act')} ${q.activationRate == null ? t('na') : fmt.pct(q.activationRate)}</span>`);
  if (q.meanCostUsd != null) bits.push(`<span class="muted">${fmt.usd(q.meanCostUsd)}</span>`);
  if (q.n != null) bits.push(`<span class="muted">n=${q.n}</span>`);
  if (q.lowSample) bits.push(`<span class="badge warn">${t('badge.lowSample')}</span>`);
  if (q.degraded) bits.push(`<span class="badge warn">${t('badge.degraded')}</span>`);
  return `<div class="qov-item" data-qid="${fmt.esc(q.id)}" onclick="selectQuestion(this)" style="border-left-color:${col}" title="${fmt.esc(q.label)}">
    <div class="qov-row1"><span class="qov-glyph" style="color:${col}">${glyph}</span><span class="qov-score" style="color:${col}">${score}</span><span class="qov-label">${fmt.esc(q.label)}</span></div>
    <div class="qov-row2">${bits.join('')}</div></div>`;
}
// Render the selected question's FULL detail (reuses the existing taskPanel verbatim) into the right pane.
function selectQuestion(el) {
  const qid = el.dataset.qid, e = copyPayload.exp;
  if (!e || !e.tasks || !e.tasks[qid]) return;
  document.querySelectorAll('#qov-list .qov-item').forEach(x => x.classList.toggle('active', x === el));
  const pane = document.getElementById('qov-detail');
  if (!pane) return;
  pane.innerHTML = taskPanel(qid, e.tasks[qid], e.profile?.skills ?? []);
  applyPersistedDetails(pane);
  annRender();
}

// Deep-diagnostics section (collapsed by default). Everything that answers "why/how deep" — runtime
// descriptor, context tax, upgrade/sequence stats, obs, health, metadata — lives below the focal
// task runs. filter(Boolean) drops panels that render nothing (claude-code runtime, no context
// insights, pre-metadata experiments) so the section never shows an empty shell; if ALL are empty
// the section itself is absent. Open/closed state persists per-user via applyPersistedDetails.
// Part D depgraph resolver: embedded (new experiments, stats.depgraph) OR the non-authoritative
// supplemental channel (old experiments backfilled via `aiide stats <id> --force --write`). Null → panel absent.
function expDepgraph(e) { return e?.stats?.depgraph ?? e?.supplemental?.sections?.depgraph ?? null; }

function diagnosticsSection(e) {
  // Part D: the single-arm reference-relationship charts join the diagnostics stack. Experiments with
  // neither embedded nor supplemental depgraph → relationshipChartsHtml → '' → panel absent (honest).
  const inner = [runtimePanel(e), contextInsightsPanel(e.contextInsights), expStatsPanel(e),
                 runObsPanel(e), runHealthPanel(e), relationshipChartsHtml(expDepgraph(e)), metadataPanel(e)].filter(Boolean).join('');
  if (!inner) return '';
  return `<details class="diag-section" data-persist="exp-diagnostics"><summary>${t('panel.diagnostics')}</summary>${inner}</details>`;
}

// init the relationship ECharts only once the (default-collapsed) diagnostics section is actually
// visible — ECharts on a display:none container measures 0×0. Wires the details' toggle: first open →
// init; later opens → resize. Persisted-open → init immediately.
function wireDiagnosticsCharts(depgraph) {
  if (!depgraph) return;
  const sec = document.querySelector('.diag-section');
  if (!sec) return;
  let inited = false;
  const onToggle = () => {
    if (!sec.open) return;
    if (!inited) { inited = true; initRelationshipCharts(depgraph); }
    else _charts.forEach(c => { try { c.resize(); } catch { /* disposed */ } });
  };
  sec.addEventListener('toggle', onToggle);
  if (sec.open) onToggle();
}

// runtime-under-test card: what was benchmarked, which endpoint, which env keys crossed the
// boundary — names only, values are never persisted (BYOK promise, see rt.help tooltip)
function runtimePanel(e) {
  if (!e.service && (e.runtime ?? 'claude-code') === 'claude-code') return '';
  const sv = e.service ?? {};
  return `<div class="panel"><h3>${t('panel.runtime')} — ${fmt.esc(e.runtime ?? '')}</h3>
    <div class="cards">
      ${card(fmt.esc(sv.model ?? e.model), t('rt.model'))}
      ${sv.endpointHost ? card(fmt.esc(sv.endpointHost), t('rt.endpoint')) : ''}
    </div>
    ${sv.cmd ? `<div class="diag muted">${t('rt.service')}: <code>${fmt.esc(sv.cmd)}</code>${sv.cwd ? ` <span class="muted">@ ${fmt.esc(sv.cwd)}</span>` : ''}</div>` : ''}
    ${sv.envKeys?.length ? `<div class="diag muted" style="margin-top:4px">${t('rt.envKeys')}: ${sv.envKeys.map(k => `<span class="badge">${fmt.esc(k)}</span>`).join(' ')}</div>` : ''}
    ${runtimeInfoHtml(e)}
    <div style="margin-top:8px">${infoTip(t('rt.help.title'), t('rt.help.body'))}</div>
  </div>`;
}

// §4 runtime 自述 (runtime_info) section inside the runtime-under-test card. Consumes
// OBS.runtimeInfoView (pure view model, all copy constants live in obs.js). Honesty rules:
// no runtime_info → the honest placeholder line, never a blank (null-not-zero); a partial
// descriptor gets a per-dimension 未自述 placeholder; the fingerprint badge discloses
// text-captured (harness-recomputed, verifiable) vs self-reported; tokensEst 恒标估算;
// deduped drift digests >1 → drift warning. claude-code experiments carry no runtime_info
// channel and (without a service) never reach this panel — 照旧简洁, nothing changes for them.
function runtimeInfoHtml(e) {
  const v = runtimeInfoView(e.environment ?? {});
  if (!v.present) return `<div class="diag muted" style="margin-top:6px">${fmt.esc(v.placeholder)}</div>`;
  const sp = v.systemPrompt;
  const spLine = sp
    ? `<code>${fmt.esc(sp.shaShort ?? '—')}</code>${sp.bytes != null ? ` · ${fmt.n(sp.bytes)} B` : ''}${sp.tokensEst != null ? ` · ≈ ${fmt.n(sp.tokensEst)} tokens <span class="muted">（估算，estimate）</span>` : ''} <span class="badge ${sp.badge.tone === 'ok' ? 'ok' : 'warn'}">${fmt.esc(sp.badge.word)}</span>`
    : `<span class="muted">${fmt.esc(RUNTIME_INFO_FIELD_ABSENT.systemPrompt)}</span>`;
  const toolsLine = v.tools
    ? (v.tools.length
        ? v.tools.map(tl => `<span class="badge">${fmt.esc(tl.name)}${tl.kind ? ` <span class="muted">${fmt.esc(tl.kind)}</span>` : ''}</span>`).join(' ')
        : '<span class="muted">自述工具清单为空（0 tools）</span>')
    : `<span class="muted">${fmt.esc(RUNTIME_INFO_FIELD_ABSENT.tools)}</span>`;
  const defaultsLine = v.defaults != null
    ? `<code>${fmt.esc(JSON.stringify(v.defaults))}</code>`
    : `<span class="muted">${fmt.esc(RUNTIME_INFO_FIELD_ABSENT.defaults)}</span>`;
  return `<div style="margin-top:8px"><b>runtime 自述</b> <span class="muted" style="font-size:12px">（runtime_info，指纹形式）</span>${v.driftNote ? ` <span class="badge warn" title="${fmt.esc(v.driftDigests.map(d => d.slice(0, 12)).join(' · '))}">${fmt.esc(v.driftNote)}</span>` : ''}
    <div class="diag muted" style="margin-top:4px">${fmt.esc(v.name ?? '—')}${v.version ? ` <span class="badge">v${fmt.esc(v.version)}</span>` : ''}</div>
    <div class="diag" style="margin-top:4px"><span class="muted">system prompt:</span> ${spLine}</div>
    <div class="diag" style="margin-top:4px"><span class="muted">tools:</span> ${toolsLine}</div>
    <div class="diag" style="margin-top:4px"><span class="muted">defaults:</span> ${defaultsLine}</div>
  </div>`;
}

// small ⓘ icon + short label; full explanation appears as a hover/focus popover (below the icon)
function infoTip(title, body) {
  const label = String(title).replace(/^ⓘ\s*/, '');
  return `<span class="tip below" tabindex="0"><span class="tipbtn">i</span><span class="muted" style="font-size:12px">${label}</span><span class="tippop">${fmt.esc(body)}</span></span>`;
}

// in-place term tooltip: hovering the exact stat (ctx / Δ / cache read / …) explains
// that stat right above it — dotted underline marks the hoverable terms
function term(labelHtml, tipText, extra = '') {
  return `<span class="tip term ${extra}" tabindex="0"><span class="lbl">${labelHtml}</span><span class="tippop">${fmt.esc(tipText)}</span></span>`;
}

function contextInsightsPanel(ci) {
  if (!ci || !ci.skillListing?.length) return '';
  return `<div class="panel"><h3>${t('panel.contextInsights')}</h3>
    <table><thead><tr><th>${t('ci.skill')}</th><th>${t('ci.listing')}</th><th>${t('ci.body')}</th></tr></thead><tbody>
      ${ci.skillListing.map(s => `<tr><td><span class="badge skill">${fmt.esc(s.skill)}</span></td><td>≈ ${fmt.n(s.listingTokensEst)} tokens</td><td>≈ ${fmt.n(s.bodyTokensEst)} tokens</td></tr>`).join('')}
      <tr><td><b>${t('ci.total')}</b></td><td><b>≈ ${fmt.n(ci.listingTotalTokensEst)} tokens</b></td><td></td></tr>
    </tbody></table>
    <div class="cards" style="margin-top:10px">
      ${ci.meanFirstRoundContext != null ? card(fmt.n(ci.meanFirstRoundContext), t('ci.firstRound')) : ''}
      ${ci.meanSkillBodyCostEst != null && ci.meanSkillBodyCostEst > 50 ? card('≈ ' + fmt.n(ci.meanSkillBodyCostEst), t('ci.bodyMeasured')) : ''}
    </div>
    <p class="muted">${t('ci.note')}</p>
  </div>`;
}

// ---- experiment statistics panel (design §2.3/§2.4) — three-state, block-status badges, no adopt ----
// Consumes OBS.buildExpStatsCard(e) (pure view model). Copy is zh-hans plain language; the original
// term rides in a trailing (括号) or a dotted-underline tooltip. Governance-neutral: sequence cards
// are ALWAYS 未验证假说 with no adopt affordance.
function gEx(labelHtml, key) { const g = EXP_GLOSSARY[key]; return g ? term(labelHtml, g) : labelHtml; }
function expStatsPanel(e) {
  const stCard = buildExpStatsCard(e);   // NOT named `card` — that would shadow the card() helper
  // resolver warnings (wrapper warnings passed through verbatim + corrupt-sidecar degrade notes)
  const warnHtml = (stCard.warnings ?? []).map(w => `<div class="muted" style="font-size:12px;color:var(--warn)">⚠ ${fmt.esc(w)}</div>`).join('');
  if (stCard.state === 'legacy') {
    return `<div class="panel"><h3>覆盖率统计</h3>${warnHtml}<div class="muted">${fmt.esc(stCard.backfillHint)}</div></div>`;
  }
  if (stCard.state === 'error') {
    // A3 third state: a seal-time stats failure renders as a failure, never as an empty full card
    return `<div class="panel"><h3>覆盖率统计</h3>${warnHtml}<div style="color:var(--err)">统计计算失败：${fmt.esc(stCard.error)}</div></div>`;
  }
  const ss = stCard.sampleSize, bd = ss.breakdown;
  // authority badge (A3): embedded = 封存权威; sidecar = honest non-authoritative backfill
  const authBadge = stCard.authorityBadge ? ` <span class="badge ${stCard.authorityBadge.tone === 'ok' ? 'ok' : 'warn'}" title="${fmt.esc(stCard.authority ?? '')}">${fmt.esc(stCard.authorityBadge.word)}</span>` : '';
  // Stage 4 provenance badge: stats.provenance 'adapter-reported' → 自报信号披露; absent/observed → no badge
  const provBadge = stCard.provenanceBadge ? ` <span class="badge ${stCard.provenanceBadge.tone === 'ok' ? 'ok' : 'warn'}" title="stats.provenance: ${fmt.esc(stCard.provenance ?? '')}">${fmt.esc(stCard.provenanceBadge.word)}</span>` : '';
  let h = `<div class="panel"><h3>覆盖率统计${authBadge}${provBadge} <span class="muted" style="font-size:12px">${gEx('cli 下沉', 'cliSink')}信号</span></h3>`;
  h += warnHtml;
  // sidecarIgnored 语义（taxonomy §3.0 窄化）：权威数字未采用 sidecar——有 supplemental 时两者并存
  if (stCard.sidecarIgnored) h += `<div class="muted" style="font-size:12px">ⓘ ${stCard.supplementalSections
    ? '重算 sidecar 未被权威数字采用——其新增统计节以非权威补算并列展示（见下）'
    : '存在被忽略的重算 sidecar（CLI 诊断用）——封存实验以内嵌统计为准'}</div>`;
  // taxonomy §3.0 supplemental：独立块 + 独立「回填（非权威）」徽章——绝不挂在权威徽章下、绝不并进权威数字
  if (stCard.supplementalSections) {
    const supBadge = stCard.supplementalBadge ? ` <span class="badge warn">${fmt.esc(stCard.supplementalBadge.word)}</span>` : '';
    const supKeys = Object.keys(stCard.supplementalSections).map(k => `<code>${fmt.esc(k)}</code>`).join(' · ');
    h += `<div style="margin:8px 0 4px"><b>补算统计节</b>${supBadge} <span class="muted" style="font-size:12px">schema v${fmt.esc(String(stCard.supplementalSchema?.from ?? '—'))} → v${fmt.esc(String(stCard.supplementalSchema?.to ?? '—'))}——封存数字不变，以下新增节为非权威补算</span></div>`;
    h += `<div class="muted" style="font-size:12px">${supKeys}</div>`;
  }
  h += `<div class="cards">${card(String(ss.nCoverageValid), gEx('有效样本 n', 'nCoverageValid'))}</div>`;
  h += `<div class="muted" style="font-size:12px;margin:4px 0 10px">${fmt.esc(ss.note)} · 拆分：有效 ${bd.valid} / 排除 ${bd.excluded} / 留出 ${bd.heldOut} / 无 session ${bd.noSession} / 未解析 ${bd.unresolved}</div>`;
  // M1 skill coverage
  const sc = stCard.skillCoverage;
  if (sc) {
    h += `<div style="margin:8px 0 4px"><b>触发覆盖</b> <span class="muted">${sc.triggered}/${sc.installed}${sc.coverageRatio == null ? '' : ' = ' + fmt.pct(sc.coverageRatio)}</span></div>`;
    if (sc.neverTriggered.skills.length) h += `<div class="muted" style="font-size:12px">${term('从未触发', sc.neverTriggered.hint)}：${sc.neverTriggered.skills.map(x => `<span class="badge warn">${fmt.esc(x)}</span>`).join(' ')}</div>`;
    if (sc.notExercised.skills.length) h += `<div class="muted" style="font-size:12px">${term('没题目考它', sc.notExercised.hint)}：${sc.notExercised.skills.map(x => `<span class="badge">${fmt.esc(x)}</span>`).join(' ')}</div>`;
  }
  // §S v2 per-skill expansion rows (B1 refs 明细 + B6 miss 清单)。upgradeHint 不再互斥于明细行：
  // v2 embedded 有明细但缺 v3 新节（旧 schema 提示真路径）；v1 的 skillDetails 本就是 []。
  if (stCard.upgradeHint) h += `<div class="muted" style="font-size:12px;margin:4px 0">${fmt.esc(stCard.upgradeHint)}</div>`;
  for (const row of stCard.skillDetails ?? []) h += expSkillDetailHtml(row);
  // M2 reference coverage + three exemption buckets (bySkill=null → reason, NEVER 读到 0/0)
  const rc = stCard.refCoverage;
  if (rc && rc.unknown) {
    h += `<div style="margin:10px 0 4px"><b>参考文档读取</b></div>`;
    h += `<div class="muted" style="font-size:12px">${rc.reason === 'external-runtime-self-managed'
      ? '外部运行时自管 skills，无参考文档清单可核对（external-runtime-self-managed）'
      : '无清单快照，参考文档读取不可知（no-inventory-snapshot）'}</div>`;
  } else if (rc) {
    // 分母文案四态: snapshot（无注记）· adapter-declared（可知分母 + 自报徽章）·
    // none-backfill（shipped null → 清单不可知注记）· external-runtime（走上方 unknown 分支）
    const declaredInv = rc.inventoryStatus === 'adapter-declared';
    const invBadge = declaredInv ? ` <span class="badge warn" title="inventoryStatus: adapter-declared">清单由 adapter 自报（未经 harness 快照核验）</span>` : '';
    h += `<div style="margin:10px 0 4px"><b>参考文档读取</b> <span class="muted">读到 ${rc.read}/${rc.shipped == null ? '—' : rc.shipped}${rc.shipped == null ? '（清单不可知，仅观测到的读取——no-inventory-snapshot）' : ''}</span>${invBadge}</div>`;
    if (declaredInv && rc.outOfInventoryReads) h += `<div class="muted" style="font-size:12px">另有 ${rc.outOfInventoryReads} 笔清单外读取（自报）——读到的文档不在自报清单内</div>`;
    if (rc.sharedReads) h += `<div class="muted" style="font-size:12px">其中 ${rc.sharedReads} 份为共享文档（_shared），无法归属到具体 skill（shared-hash-namespace）</div>`;
    if (rc.unreadRefs.length) h += `<div class="muted" style="font-size:12px">未读（死重候选）：${rc.unreadRefs.map(u => `<code>${fmt.esc(u.ref)}</code>`).join(' · ')}</div>`;
    const ex = rc.exemptions;
    const buckets = [];
    if (ex.artifactOnly.refs.length) buckets.push(`${term('权限拒绝', ex.artifactOnly.hint)} ${ex.artifactOnly.refs.length}`);
    if (ex.excludedOnly.refs.length) buckets.push(`${term('仅排除运行读过', ex.excludedOnly.hint)} ${ex.excludedOnly.refs.length}`);
    if (ex.notExercised.skills.length) buckets.push(`${term('skill 未触发', ex.notExercised.hint)} ${ex.notExercised.skills.length}`);
    if (buckets.length) h += `<div class="muted" style="font-size:12px">判死重前已豁免：${buckets.join(' · ')}</div>`;
  }
  // M3-M5 probe signals (three-state) + M7 proximity
  const cli = stCard.probes;
  if (!cli || !cli.configured) {
    h += `<div class="muted" style="font-size:12px;margin-top:10px">未配置外部工具探针（stats.probes = null）</div>`;
  } else {
    for (const tl of cli.tools) {
      const cov = tl.coverage;
      h += `<div style="margin:10px 0 4px"><b>${gEx('命令面覆盖', 'commandSurface')}</b> <span class="badge ${cov?.status === 'suspect' ? 'err' : cov?.status === 'unavailable' ? 'warn' : 'ok'}">${fmt.esc(tl.coverageStatus.word)}</span> <code>${fmt.esc(tl.tool)}</code></div>`;
      if (cov && cov.status !== 'unavailable') {
        h += `<div class="muted" style="font-size:12px">${cov.invoked.length}/${cov.declared}${cov.ratio == null ? '' : ' = ' + fmt.pct(cov.ratio)}${cov.unused.length ? ' · 从未用到 ' + cov.unused.join(', ') : ''}${cov.undeclaredInvoked.length ? ' · 命令面漂移 ' + cov.undeclaredInvoked.join(', ') : ''}</div>`;
      }
      for (const sq of tl.sequences) {
        h += `<div class="muted" style="font-size:12px">${term('未验证假说', EXP_GLOSSARY.hypothesisSeq)}：命令连发 ${fmt.esc(sq.seq.join(' → '))}（${sq.distinctCases} 个不同题目）${sq.knownCollapse ? ' · 注记：或可用 <code>' + fmt.esc(sq.knownCollapse) + '</code>' : ''}</div>`;
      }
    }
  }
  const px = stCard.proximity;
  if (px) {
    h += `<div style="margin:10px 0 4px"><b>${gEx('关联强度', 'proximityStrength')}</b> <span class="muted">时序邻近，非因果 · n=${px.n}</span></div>`;
    h += `<table><thead><tr><th>前 → 后</th><th>紧邻度</th><th>置信</th><th>lift</th><th>n</th></tr></thead><tbody>`;
    for (const ed of px.topEdges) h += `<tr><td><code>${fmt.esc(ed.from.type + ':' + ed.from.id)}</code> → <code>${fmt.esc(ed.to.type + ':' + ed.to.id)}</code></td><td>${ed.closeness}</td><td>${ed.confidence == null ? '—' : ed.confidence}</td><td>${ed.lift == null ? '—' : ed.lift}</td><td>${ed.pairCases}</td></tr>`;
    h += `</tbody></table>`;
  }
  return h + `</div>`;
}

// One per-skill <details data-persist> expansion row (design B1 refs 明细 + B6 miss 清单).
// Reuses the existing data-persist native-folding pattern — zero new event management. Ratios are
// always x/y side by side; a 0 denominator renders as — (never a fake percentage).
function expSkillDetailHtml(row) {
  const xy = (x, y) => y ? `${x}/${y}` : `${x}/—`;
  const trigTxt = row.trigger ? xy(row.trigger.triggered, row.trigger.attempted) : '—';
  let body = '';
  // refs 明细 (schemaVersion 2): bytes | 读到题数 | 共同触发读取率 x/y | blocked badge
  if (row.refsNote === 'external-runtime-self-managed') {
    body += `<div class="muted" style="font-size:12px">外部运行时自管（external-runtime-self-managed）——参考文档清单不可知</div>`;
  } else if (row.refsNote === 'no-inventory-snapshot') {
    body += `<div class="muted" style="font-size:12px">无快照（no-inventory-snapshot）——仅能显示观测到的读取，此 skill 未观测到任何读取</div>`;
  } else if (row.refsNote === 'adapter-declared') {
    body += `<div class="muted" style="font-size:12px">清单由 adapter 自报（adapter-declared）——该 skill 不在自报清单内，无参考文档行可核对</div>`;
  } else if (row.refs && row.refs.length) {
    body += `<table><thead><tr><th>参考文档（ref）</th><th>字节（bytes）</th><th>读到题数（readsCases）</th><th>${term('触发时读取率（readRateCoTriggered）', '同一道题里该 skill 触发且这份参考文档被读到的题数 / 该 skill 触发过的题数（皆按不同题目计）')}</th><th></th></tr></thead><tbody>`;
    for (const r of row.refs) {
      body += `<tr><td><code>${fmt.esc(r.ref)}</code></td><td>${r.bytes == null ? (r.reason === 'shared-hash-namespace' ? term('—', '共享文档的运行期名字带内容哈希，封存时无法对上字节数（内部名 shared-hash-namespace）') : r.reason === 'adapter-declared' ? term('—', '清单由 adapter 自报，无 harness 快照，字节数不可知（内部名 adapter-declared）') : '—') : fmt.n(r.bytes)}</td><td>${r.readsCases}</td><td>${xy(r.readRateCoTriggered.x, r.readRateCoTriggered.y)}</td><td>${r.blocked ? '<span class="badge err">读取被权限拦截</span>' : ''}</td></tr>`;
    }
    body += `</tbody></table>`;
  } else if (row.refs) {
    body += `<div class="muted" style="font-size:12px">无参考文档（可知且为空）</div>`;
  }
  // B6 miss 清单: triggered=0 cases — 行动语义: 修 expected skill 触发描述 / 收窄 firedInstead skill 触发面
  if (row.misses) {
    body += `<div style="margin:8px 0 2px"><b>未命中题目（miss）</b> <span class="muted" style="font-size:12px">修这个 skill 的触发描述，或收窄实际抢答 skill 的触发面</span></div>`;
    for (const m of row.misses) {
      const fired = m.firedInstead == null
        ? `<span class="muted">无 session 可判</span>`
        : m.firedInstead.length
          ? `实际触发（firedInstead）：${m.firedInstead.map(s => `<span class="badge warn">${fmt.esc(s)}</span>`).join(' ')}`
          : `<span class="muted">未触发任何 skill（可知且为空）</span>`;
      body += `<div class="muted" style="font-size:12px"><code>${fmt.esc(m.caseId)}</code> · ${fired}</div>`;
    }
  } else if (row.missNote === 'partial-trigger-only') {
    body += `<div class="muted" style="font-size:12px;margin-top:8px">miss 均为部分触发（同题其他 rep 已命中），无整题落空</div>`;
  }
  if (!body) return '';   // nothing knowable to expand → no empty details row
  return `<details data-persist="expstats-skill" style="margin:4px 0">
    <summary style="cursor:pointer"><span class="badge skill">${fmt.esc(row.skill)}</span> <span class="muted" style="font-size:12px">触发率（triggerRate）${trigTxt}</span></summary>
    <div style="margin:6px 0 4px 12px">${body}</div>
  </details>`;
}

// ---- taxonomy T1 Stage 6: 运行观测 / 运行健康 cards over the v3 stats sections ------------------
// Section source resolution (§3.0): the embedded stats blob carries a v3 section only at
// schemaVersion ≥ 3 (authoritative); below that, the resolver's supplemental.sections
// (non-authoritative recompute) supplies it. The CALLER decides the source here — the obs.js view
// models just take (section, { nonAuthoritative }) and carry the honesty flag through.
function v3Section(e, key) {
  const stats = e.stats;
  if (stats && !stats.error && (stats.schemaVersion ?? 1) >= 3 && key in stats)
    return { section: stats[key], nonAuthoritative: false };
  const sup = e.supplemental?.sections;
  if (sup && key in sup) return { section: sup[key], nonAuthoritative: true };
  return null; // no v3 section anywhere (legacy experiment, no supplemental) → segment absent
}
// supplemental-sourced segment badge — the S5 回填（非权威） style, pinned per SEGMENT (§3.0:
// never hung under the 权威（封存时计算） badge)
const supBadge = (on) => on ? ` <span class="badge warn">回填（非权威）</span>` : '';
// honest null-section line (§3.0 null-not-zero): zh reason copy + canonical reason code —
// a null section renders its reason, never a blank and never a 0
const nullReasonLine = (v) => `<div class="muted" style="font-size:12px">— ${fmt.esc(v.reasonCopy)}${v.reason ? `（${fmt.esc(v.reason)}）` : ''}</div>`;

// 运行观测 card: contextComposition (§3.1) + toolUsage (§3.2) + fileTargets (§3.4, folded into the
// tool-usage segment). Rendered ONLY when at least one v3 section resolves (embedded or supplemental).
function runObsPanel(e) {
  const cc = v3Section(e, 'contextComposition');
  const tu = v3Section(e, 'toolUsage');
  const ft = v3Section(e, 'fileTargets');
  if (!cc && !tu && !ft) return '';
  const ccV = cc ? contextCompositionView(cc.section, { nonAuthoritative: cc.nonAuthoritative }) : null;
  const tuV = tu ? toolUsageView(tu.section, { nonAuthoritative: tu.nonAuthoritative }) : null;
  const ftV = ft ? fileTargetsView(ft.section, { nonAuthoritative: ft.nonAuthoritative }) : null;
  let h = `<div class="panel"><h3>运行观测 <span class="muted" style="font-size:12px">context 组成 + 工具使用（contextComposition · toolUsage · fileTargets）</span></h3>`;
  // §3.1 contextComposition — 增量归因视角（copy ban: never a cost view）
  if (ccV) {
    h += `<div style="margin:8px 0 4px"><b>${fmt.esc(ccV.title ?? CONTEXT_COMPOSITION_TITLE)}</b>${!ccV.null && ccV.estimate ? ' <span class="badge warn">估算（estimate）</span>' : ''}${supBadge(ccV.nonAuthoritative)}</div>`;
    if (ccV.null) h += nullReasonLine(ccV);
    else {
      h += `<table><thead><tr><th>组成桶</th><th>占比（均值）</th><th>范围（min–max）</th></tr></thead><tbody>`;
      for (const row of ccV.rows) h += `<tr><td>${fmt.esc(row.label)}</td><td>${row.share == null ? '—' : fmt.pct(row.share.mean)}</td><td class="muted">${row.share == null ? '—' : fmt.pct(row.share.min) + '–' + fmt.pct(row.share.max)}</td></tr>`;
      h += `</tbody></table>`;
      const cp = ccV.compaction;
      h += `<div class="muted" style="font-size:12px;margin-top:4px">${fmt.esc(cp.label)}：${cp.runsWithCompaction > 0
        ? `${cp.runsWithCompaction} 个 run 出现 · 绝对量均值 ≈ ${fmt.n(cp.absolute?.mean)} tokens · 相对分母均值 ${fmt.pct(cp.shareOfDenominator?.mean ?? 0)}`
        : '未观测到压缩'}</div>`;
      h += `<div class="muted" style="font-size:12px">n=${ccV.n}${ccV.untaggedLegacyRuns ? ` · 跳过未标记旧 run ${ccV.untaggedLegacyRuns}` : ''}${ccV.zeroFootprintRuns ? ` · 跳过零 footprint run ${ccV.zeroFootprintRuns}` : ''}${ccV.skippedRounds ? ` · 跳过零 footprint 轮 ${ccV.skippedRounds}` : ''}${ccV.peakFootprint ? ` · 峰值 footprint 均值 ${fmt.n(Math.round(ccV.peakFootprint.mean))}` : ''}${ccV.maxContribution ? ` · 最大贡献 run <code>${fmt.esc(String(ccV.maxContribution.runId ?? '—'))}</code>` : ''}</div>`;
    }
  }
  // §3.2 toolUsage — byKind main/sidechain split + MCP server table + top tools
  if (tuV) {
    h += `<div style="margin:12px 0 4px"><b>${fmt.esc(tuV.title ?? TOOL_USAGE_TITLE)}</b>${supBadge(tuV.nonAuthoritative)}</div>`;
    if (tuV.null) h += nullReasonLine(tuV);
    else {
      h += `<table><thead><tr><th>类别（kind）</th><th>主链（main）</th><th>子代理（sidechain）</th><th>合计</th></tr></thead><tbody>`;
      for (const k of tuV.byKind) h += `<tr><td><code>${fmt.esc(k.kind)}</code></td><td>${fmt.n(k.main)}</td><td>${fmt.n(k.sidechain)}</td><td>${fmt.n(k.total)}</td></tr>`;
      h += `</tbody></table>`;
      h += `<div class="muted" style="font-size:12px">${fmt.esc(tuV.scopeNote)} · ${fmt.esc(tuV.kindSourceNote)}：${tuV.kindSource.declared}/${tuV.kindSource.inferred}${tuV.allowlistVersion ? ` · ${fmt.esc(tuV.allowlistNote)}：<code>${fmt.esc(tuV.allowlistVersion)}</code>` : ''}</div>`;
      if (tuV.mcpServers.length) {
        h += `<div style="margin:6px 0 2px"><b>MCP server 切分</b></div><table><thead><tr><th>server</th><th>调用（calls）</th><th>错误（errors）</th><th>权限拒绝（denials）</th></tr></thead><tbody>`;
        for (const m of tuV.mcpServers) h += `<tr><td><code>${fmt.esc(m.server)}</code></td><td>${fmt.n(m.calls)}</td><td>${fmt.n(m.errors)}</td><td>${fmt.n(m.denials)}</td></tr>`;
        h += `</tbody></table>`;
      }
      if (tuV.topTools.length) h += `<div class="muted" style="font-size:12px">高频工具（topTools）：${tuV.topTools.map(tl => `<code>${fmt.esc(tl.name)}</code> ${fmt.n(tl.calls)}${tl.errors ? `（错 ${tl.errors}）` : ''}${tl.denials ? `（拒 ${tl.denials}）` : ''}`).join(' · ')}</div>`;
    }
  }
  // §3.4 fileTargets — folded into the tool-usage card（skill 没被读时在读什么/改了什么）
  if (ftV) {
    h += `<div style="margin:12px 0 4px"><b>${fmt.esc(ftV.title ?? FILE_TARGETS_TITLE)}</b>${supBadge(ftV.nonAuthoritative)}</div>`;
    if (ftV.null) h += nullReasonLine(ftV);
    else {
      h += `<table><thead><tr><th></th>${ftV.reads.rows.map(r => `<th>${fmt.esc(r.label)}</th>`).join('')}<th>无路径（pathless）</th></tr></thead><tbody>`;
      const sideRow = (label, s) => `<tr><td>${label}</td>${s.rows.map(r => `<td>${fmt.n(r.count)}</td>`).join('')}<td>${fmt.n(s.pathless)}</td></tr>`;
      h += sideRow('读（Read）', ftV.reads);
      h += sideRow('写（Write/Edit/NotebookEdit/MultiEdit）', ftV.writes);
      h += `</tbody></table>`;
      h += `<div class="muted" style="font-size:12px">${fmt.esc(ftV.pathlessNote)} · n=${ftV.n}${ftV.noCwdRuns ? ` · 跳过无 cwd run ${ftV.noCwdRuns}` : ''}</div>`;
    }
  }
  return h + `</div>`;
}

// 运行健康 card: cacheHitRate / truncation / sidechainShare / selfReport / statsHealth (§3.3/§3.5)
// — one card, five segments, each with its own null-reason line.
function runHealthPanel(e) {
  const keys = ['cacheHitRate', 'truncation', 'sidechainShare', 'selfReport', 'statsHealth'];
  const srcs = keys.map((k) => [k, v3Section(e, k)]);
  if (srcs.every(([, s]) => !s)) return '';
  // one experiment resolves ALL five from one source — embedded v3 carries the full closed set,
  // supplemental supplies the full set above a stale embedded — so a single card flag is exact
  const nonAuthoritative = srcs.some(([, s]) => s?.nonAuthoritative === true);
  const sections = Object.fromEntries(srcs.filter(([, s]) => s).map(([k, s]) => [k, s.section]));
  // selfReport 自报 vs 估算并列：估算 = Σ(任务均值成本 × 有效 n)——与自报（result 行 Σ）口径不同，
  // 视图模型的 caliberNote 明示两者仅并列、绝不合并；无任务成本数据 → null（不可得），不是 0
  const estTasks = Object.values(e.tasks ?? {}).filter((tk) => tk?.efficiency?.meanCostUsd != null && tk?.n > 0);
  const estimatedCostUsd = estTasks.length ? estTasks.reduce((a, tk) => a + tk.efficiency.meanCostUsd * tk.n, 0) : null;
  const v = runHealthView(sections, { nonAuthoritative, estimatedCostUsd });
  if (v.empty) return '';
  let h = `<div class="panel"><h3>运行健康 <span class="muted" style="font-size:12px">cache · 截断 · 子代理 · 自报成本 · 异常（cacheHitRate · truncation · sidechainShare · selfReport · statsHealth）</span></h3>`;
  const seg = (heading, sv, body) => {
    if (!sv) return '';
    return `<div style="margin:10px 0 4px"><b>${heading}</b>${supBadge(sv.nonAuthoritative)}</div>` + (sv.null ? nullReasonLine(sv) : body(sv));
  };
  h += seg('cache 命中率（cacheHitRate）', v.cache, (s) => {
    let b = `<div class="muted" style="font-size:12px">逐轮 cacheR/footprint 的 run 均值：${fmt.pct(s.mean)}（${fmt.pct(s.min)}–${fmt.pct(s.max)}）· n=${s.n}${s.skippedRounds ? ` · 跳过无用量/零 footprint 轮 ${s.skippedRounds}` : ''}</div>`;
    if (s.byRepeat.length > 1) {
      b += `<table><thead><tr><th>repeat 序</th><th>cache 命中率均值</th><th>n</th></tr></thead><tbody>`;
      for (const r of s.byRepeat) b += `<tr><td>${r.repeat}</td><td>${fmt.pct(r.meanCacheR)}</td><td>${r.n}</td></tr>`;
      b += `</tbody></table><div class="muted" style="font-size:12px">${fmt.esc(s.byRepeatNote)}</div>`;
    }
    return b;
  });
  h += seg('输出截断（truncation）', v.truncation, (s) => {
    const fr = s.finalRoundTruncated;
    let b = `<div class="muted" style="font-size:12px">截断轮占比 ${fmt.pct(s.truncatedRoundShare)}（分母 ${s.rounds} 轮）· 末轮截断 run ${fr ? `${fr.runs}/${fr.n}${fr.share == null ? '（0/0 不可知）' : ''}` : '—'}${s.unknownStopReason ? ` · 无 stop reason 轮 ${s.unknownStopReason}——${fmt.esc(s.unknownNote)}` : ''}${s.unknownFinalRuns ? ` · 末轮不可判 run ${s.unknownFinalRuns}` : ''}</div>`;
    if (s.byReason.length) b += `<div class="muted" style="font-size:12px">stopReason 分布：${s.byReason.map(r => `<code>${fmt.esc(r.reason)}</code> ${r.count}`).join(' · ')}</div>`;
    return b;
  });
  h += seg('子代理份额（sidechainShare）', v.sidechain, (s) => {
    const sh = (t) => t == null || t.share == null ? '—（0/0 不可知）' : fmt.pct(t.share);
    return `<div class="muted" style="font-size:12px">tokens ${sh(s.tokens)} · 工具调用 ${sh(s.toolCalls)} · 开销量级（equivTokens）${sh(s.equivTokens)} · 含子代理 run ${s.runsWithSidechain}/${s.n}<br>${fmt.esc(s.equivNote)}</div>`;
  });
  h += seg('自报成本（selfReport）', v.selfReport, (s) =>
    `<div class="muted" style="font-size:12px">自报 Σ ${s.totalCostUsd == null ? '—' : fmt.usd(s.totalCostUsd)}（${s.runsWithSelfReport} run · ${s.invocations} 次 result 行）vs 估算 ${s.estimatedCostUsd == null ? '—（不可得）' : '≈ ' + fmt.usd(s.estimatedCostUsd)}${s.numTurns != null ? ` · 自报轮数 Σ ${fmt.n(s.numTurns)}` : ''}${s.durationMs != null ? ` · 自报耗时 Σ ${fmt.ms(s.durationMs)}` : ''}${s.isError ? ' · <span class="badge err">含自报错误（is_error）</span>' : ''}<br>${fmt.esc(s.caliberNote)}</div>`);
  h += seg('观测管线健康（statsHealth）', v.statsHealth, (s) => {
    const tr = s.timeoutRate;
    let b = `<div class="muted" style="font-size:12px">排除分布（exclusionBreakdown）：${s.exclusions.length ? s.exclusions.map(x => `<code>${fmt.esc(x.signature)}</code> ${x.count}`).join(' · ') : '无（可知且为空）'}</div>`;
    b += `<div class="muted" style="font-size:12px">超时率（timeoutRate）：${tr ? (tr.rate == null ? '—（无可知分母）' : `${fmt.pct(tr.rate)}（${tr.timedOut}/${tr.n}）`) + (tr.legacyUnknown ? `，另有 legacy 不可知 ${tr.legacyUnknown}——${fmt.esc(s.timeoutLegacyNote)}` : '') : '—'}</div>`;
    if (s.abortedAtStep.length) b += `<div class="muted" style="font-size:12px">中止步分布（abortedAtStep）：${s.abortedAtStep.map(x => `步 ${fmt.esc(x.step)} × ${x.count}`).join(' · ')}</div>`;
    b += `<div class="muted" style="font-size:12px">重试后成功（retriedThenSucceeded）：${s.retriedThenSucceeded} · parse 警告 Σ ${s.parseWarningsTotal}</div>`;
    if (s.verifierFails.length) b += `<div class="muted" style="font-size:12px">最常红的 verifier：${s.verifierFails.map(x => `<code>${fmt.esc(x.verifier)}</code> × ${x.fails}`).join(' · ')}</div>`;
    return b;
  });
  return h + `</div>`;
}

// ---- metadata panel + annotations editor (interaction spec: docs/ixd/feature-experiment-metadata.md) ----
let ann = null; // editor state for the experiment currently on screen

function metadataPanel(e) {
  if (!e.environment && !e.meta && !e.captured) return ''; // experiments recorded before metadata existed
  ann = { expId: e.id, data: { ...(e.annotations ?? {}) }, editing: null, confirmKey: null,
          error: null, busy: false, flashKey: null, corrupt: Boolean(e.annotationsWarning) };
  const env = e.environment ?? {};
  const sum = [
    env.aiideVersion ? `aiide ${env.aiideVersion}` : null,
    env.nodeVersion ? `node ${env.nodeVersion}` : null,
    env.os?.platform ?? null,
    env.runtimeVersion ? `runtime ${env.runtimeVersion}` : null,
  ].filter(Boolean).join(' · ');
  const hasCustom = Object.keys(e.meta ?? {}).length || Object.keys(e.captured ?? {}).length;
  return `<div class="panel"><h3>${t('panel.metadata')}</h3>
    <div class="mgroup"><details data-persist="md-env">
      <summary class="muted" style="cursor:pointer">${t('md.env')} <span style="color:var(--fg)">${fmt.esc(sum)}</span></summary>
      <div style="margin-top:8px">${envRows(env).map(([k, v]) => kvRow(k, v)).join('')}</div>
    </details></div>
    ${hasCustom ? `<div class="mgroup"><h4>${t('md.metaCap')}</h4>
      ${Object.entries(e.meta ?? {}).map(([k, m]) =>
        kvRow(k, `${fmt.esc(String(m.value))} <span class="badge" title="${t('md.sourceTip')}">${fmt.esc(t('md.source.' + m.source))}</span>`)).join('')}
      ${Object.entries(e.captured ?? {}).map(([k, c]) =>
        kvRow(k, `${c.value == null ? `<span style="color:var(--err)">✗ ${fmt.esc(c.error ?? '')}</span>` : fmt.esc(String(c.value))} <span class="badge" title="${t('md.sourceTip')}">${t('md.source.captured')}</span>`)).join('')}
    </div>` : ''}
    <div class="mgroup"><h4>${t('md.ann')} <span class="muted" style="text-transform:none">— ${t('md.annNote')}</span></h4>
      ${ann.corrupt ? `<div style="color:var(--warn);font-size:12px;margin-bottom:6px">${t('md.corrupt')}</div>` : ''}
      <div id="ann-body"></div>
      <span id="ann-live" class="muted" role="status" aria-live="polite" style="font-size:12px"></span>
    </div>
  </div>`;
}

function kvRow(k, vHtml) {
  return `<div class="kv-row"><span class="muted" style="overflow-wrap:anywhere">${fmt.esc(k)}</span><span style="overflow-wrap:anywhere">${vHtml}</span></div>`;
}

// ordered by analytical value: what changed between runs matters more than what never changes
function envRows(env) {
  const r = [];
  r.push([t('md.runtimeVer'), env.runtimeVersion ? fmt.esc(env.runtimeVersion) : `<span class="muted">${t('na')}</span>`]);
  if (env.model) r.push([t('md.modelRow'), fmt.esc(env.model.requested ?? '') +
    (env.model.observed?.length ? ` <span class="muted">→ ${fmt.esc(env.model.observed.join(', '))}</span>` : '')]);
  if (env.suite) {
    const p = env.suite.params ?? {};
    const name = env.suite.path ? String(env.suite.path).split(/[\\/]/).at(-1) : null;
    r.push([t('md.suiteRow'), `${name ? fmt.esc(name) + ' · ' : ''}${env.suite.sha256 ? 'sha256:' + fmt.esc(env.suite.sha256.slice(0, 12)) + '…' : t('na')} <span class="muted">repeats ${p.repeats} · maxTurns ${p.maxTurns} · timeout ${Math.round((p.timeoutMs ?? 0) / 1000)}s</span>`]);
  }
  if (env.skills?.length) r.push(['skills', env.skills.map(s =>
    `<span class="badge skill">${fmt.esc(s.name)}${s.hash ? '@' + fmt.esc(s.hash.slice(0, 6)) : ''}</span>`).join('')]);
  if (env.aiideVersion) r.push(['aiide', fmt.esc(env.aiideVersion)]);
  if (env.nodeVersion) r.push(['node', fmt.esc(env.nodeVersion)]);
  if (env.os) r.push(['os', fmt.esc(`${env.os.platform ?? ''} ${env.os.release ?? ''} ${env.os.arch ?? ''}`.trim())]);
  // "default" pricing is the norm and carries zero information — only an override affects cost numbers
  if (env.pricing?.source === 'override') r.push([t('md.pricing'), fmt.esc(env.pricing.path ?? 'override')]);
  return r;
}

function jsq(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function live(msg) { const el = document.getElementById('ann-live'); if (el) el.textContent = msg; }

function annRender(focusSel) {
  const el = document.getElementById('ann-body');
  if (!el || !ann) return;
  const rows = Object.entries(ann.data).map(([k, v]) => {
    if (ann.editing?.mode === 'edit' && ann.editing.origKey === k) return annEditorRow(k, v);
    const confirming = ann.confirmKey === k;
    return `<div class="kv-row ann-row${ann.flashKey === k ? ' ann-new' : ''}">
      <span class="muted" style="overflow-wrap:anywhere">${fmt.esc(k)}</span>
      <span style="overflow-wrap:anywhere">${fmt.esc(v)}
        <span class="ann-ops">
          <button class="btn" aria-label="${t('md.edit')} ${fmt.esc(k)}" ${ann.editing || ann.busy ? 'disabled' : ''} onclick="annEdit('${jsq(k)}')">✎</button>
          <button class="btn" style="${confirming ? 'color:var(--err);border-color:var(--err)' : ''}" aria-label="${t('md.delete')} ${fmt.esc(k)}"
            ${ann.editing || ann.busy ? 'disabled' : ''} onclick="annDelete('${jsq(k)}')"
            onkeydown="if(event.key==='Escape')annConfirmCancel()" onblur="annConfirmCancel()">${confirming ? t('md.confirm') : '✕'}</button>
        </span>
      </span>
    </div>`;
  }).join('');
  const editor = ann.editing?.mode === 'add' ? annEditorRow('', '') : '';
  const addBtn = ann.editing ? '' : `<button class="btn" style="margin:6px 0 0 0" onclick="annAdd()">${t('md.addNote')}</button>`;
  el.innerHTML = rows + editor + addBtn;
  ann.flashKey = null;
  if (focusSel) el.querySelector(focusSel)?.focus();
}

function annEditorRow(k, v) {
  // draft survives re-renders (busy / save-error) so a failed save never loses user input (R8.1)
  const d = ann.editing?.draft;
  const kVal = d ? d.key : k, vVal = d ? d.val : v;
  return `<div class="kv-row ann-row" style="align-items:center">
    <input id="ann-key" class="md-in${ann.error?.field === 'key' ? ' bad' : ''}" placeholder="${t('md.keyPh')}" aria-label="${t('md.keyPh')}"
      value="${fmt.esc(kVal)}" ${ann.error ? 'aria-describedby="ann-err"' : ''} ${ann.busy ? 'readonly' : ''} onkeydown="annKeydown(event,'key')">
    <span style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="ann-val" class="md-in" style="flex:1;min-width:160px" placeholder="${t('md.valPh')}" aria-label="${t('md.valPh')}"
        value="${fmt.esc(vVal)}" ${ann.busy ? 'readonly' : ''} onkeydown="annKeydown(event,'val')">
      <button class="btn" onclick="annSave()" ${ann.busy ? 'disabled' : ''}>${ann.busy ? '…' : t('md.save')}</button>
      <button class="btn" onclick="annCancel()" ${ann.busy ? 'disabled' : ''}>${t('md.cancel')}</button>
    </span>
    ${ann.error ? `<span></span><span id="ann-err" class="md-err">${fmt.esc(ann.error.msg)}</span>` : ''}
  </div>`;
}

function annAdd() { ann.editing = { mode: 'add' }; ann.error = null; annRender('#ann-key'); }
function annEdit(k) { ann.editing = { mode: 'edit', origKey: k }; ann.error = null; annRender('#ann-key'); }
function annCancel() { ann.editing = null; ann.error = null; ann.busy = false; annRender(); }
function annKeydown(ev, field) {
  if (ev.key === 'Escape') { ev.preventDefault(); annCancel(); return; }
  if (ev.key === 'Enter') {
    ev.preventDefault();
    if (field === 'key') document.getElementById('ann-val')?.focus();
    else annSave();
  }
}

let annTimer = null;
function annConfirmCancel() {
  if (ann?.confirmKey) { ann.confirmKey = null; clearTimeout(annTimer); annRender(); }
}

async function annDelete(k) {
  if (ann.confirmKey !== k) { // two-step delete: first click arms, 3s silent window, second click commits
    ann.confirmKey = k;
    clearTimeout(annTimer);
    annTimer = setTimeout(() => { if (ann) { ann.confirmKey = null; annRender(); } }, 3000);
    // mutate the button in place instead of re-rendering: a re-render removes the focused
    // button, Chrome fires its blur mid-render, and annConfirmCancel silently disarms while
    // the stale "confirm?" html still lands on screen — the classic lost-second-click bug
    const btn = document.querySelector(`#ann-body button[aria-label="${t('md.delete')} ${k}"]`);
    if (btn) { btn.textContent = t('md.confirm'); btn.style.color = 'var(--err)'; btn.style.borderColor = 'var(--err)'; }
    return;
  }
  clearTimeout(annTimer);
  ann.confirmKey = null;
  const next = { ...ann.data };
  delete next[k];
  await annPut(next, t('md.deleted'));
}

async function annPut(next, okMsg) {
  ann.busy = true; annRender();
  try {
    const r = await fetch(`/api/experiments/${encodeURIComponent(ann.expId)}/annotations`, {
      method: 'PUT', headers: { 'content-type': 'application/json' }, body: JSON.stringify(next),
    });
    if (!r.ok) throw new Error((await r.json().catch(() => ({})))?.error ?? `HTTP ${r.status}`);
    ann.data = await r.json();
    ann.busy = false;
    live(okMsg);
    annRender();
    return true;
  } catch (err) {
    ann.busy = false;
    live(t('md.saveFailed') + err.message);
    if (ann.editing) ann.error = { field: null, msg: t('md.saveFailed') + err.message };
    annRender();
    return false;
  }
}

async function annSave() {
  const key = (document.getElementById('ann-key')?.value ?? '').trim();
  const val = document.getElementById('ann-val')?.value ?? '';
  ann.editing.draft = { key, val }; // keep input across re-renders
  const dup = key in ann.data && !(ann.editing.mode === 'edit' && ann.editing.origKey === key);
  if (!key) ann.error = { field: 'key', msg: t('md.errKeyRequired') };
  else if (!/^[A-Za-z0-9_.-]{1,64}$/.test(key)) ann.error = { field: 'key', msg: t('md.errKeyInvalid') };
  else if (dup) ann.error = { field: 'key', msg: t('md.errKeyExists') };
  else ann.error = null;
  if (ann.error) { annRender('#ann-key'); return; }
  const next = { ...ann.data };
  if (ann.editing.mode === 'edit') delete next[ann.editing.origKey];
  next[key] = val;
  ann.flashKey = key; // editor stays open while busy; cleared on success below
  if (await annPut(next, t('md.saved'))) { ann.editing = null; annRender(); }
}

// ---- compare view: metadata diff (the "incomparable dimensions" evidence table) ----
let cmpAll = false;
function flattenMeta(e) {
  const out = {};
  const env = e.environment ?? {};
  if (env.aiideVersion != null) out['aiide'] = String(env.aiideVersion);
  if (env.nodeVersion) out['node'] = env.nodeVersion;
  if (env.os) out['os'] = `${env.os.platform ?? ''} ${env.os.release ?? ''} ${env.os.arch ?? ''}`.trim();
  if (env.runtimeVersion != null) out[t('md.runtimeVer')] = String(env.runtimeVersion);
  if (env.model) {
    out['model (requested)'] = String(env.model.requested ?? '');
    if (env.model.observed?.length) out['model (observed)'] = env.model.observed.join(', ');
  }
  if (env.suite?.sha256) out['suite sha256'] = env.suite.sha256.slice(0, 12);
  if (env.suite?.params) {
    const p = env.suite.params;
    out['params'] = `repeats ${p.repeats} · maxTurns ${p.maxTurns} · timeout ${Math.round((p.timeoutMs ?? 0) / 1000)}s`;
  }
  if (env.skills?.length) out['skills'] = env.skills.map(s => `${s.name}@${(s.hash ?? '').slice(0, 6)}`).join(' ');
  if (env.pricing?.source === 'override') out[t('md.pricing')] = env.pricing.path ?? 'override'; // default = no information
  for (const [k, m] of Object.entries(e.meta ?? {})) out[`meta.${k}`] = String(m.value);
  for (const [k, c] of Object.entries(e.captured ?? {})) out[`captured.${k}`] = c.value == null ? `✗ ${c.error ?? ''}` : String(c.value);
  return out;
}

function metadataDiffPanel(a, b) {
  const fa = flattenMeta(a), fb = flattenMeta(b);
  const keys = [...new Set([...Object.keys(fa), ...Object.keys(fb)])];
  if (!keys.length) return '';
  const diff = keys.filter(k => (fa[k] ?? '—') !== (fb[k] ?? '—'));
  const shown = cmpAll ? keys : diff;
  const row = (k, va, vb, hl) => {
    const cell = v => `<td class="${hl ? 'diff-hl' : 'muted'}">${fmt.esc(v ?? '—')}</td>`;
    return `<tr${hl ? ' class="diff-row"' : ''}><td class="muted">${fmt.esc(k)}</td>${cell(va)}${cell(vb)}</tr>`;
  };
  // annotations are narrative, not dimensions — never counted as diff, listed only under "show all"
  const annRowsHtml = cmpAll
    ? [...new Set([...Object.keys(a.annotations ?? {}), ...Object.keys(b.annotations ?? {})])]
        .map(k => row(`note.${k}`, (a.annotations ?? {})[k], (b.annotations ?? {})[k], false)).join('')
    : '';
  return `<div class="panel"><h3>${t('panel.diff')} — ${diff.length} ${t('diff.count')}
      <button class="btn" onclick="cmpAll=!cmpAll;render()">${cmpAll ? t('diff.onlyDiff') : `${t('diff.showAll')} (${keys.length})`}</button></h3>
    ${shown.length || annRowsHtml
      ? `<table><thead><tr><th>${t('th.dimension')}</th><th class="cmp-a">A</th><th class="cmp-b">B</th></tr></thead>
         <tbody>${shown.map(k => row(k, fa[k], fb[k], (fa[k] ?? '—') !== (fb[k] ?? '—'))).join('')}${annRowsHtml}</tbody></table>`
      : `<div style="color:var(--ok)">${t('diff.none')}</div>`}
  </div>`;
}

// S17 activation × outcome row. Three null guardrails: (a) null activationOutcome → not rendered;
// (b) an absent partition (all triggered / all not) shows "never <side>", never a 0/0 comparison;
// (c) small n → "correlational, low sample". Read-only diagnostic.
function activationOutcomeRow(ao, skills) {
  if (!ao) return ''; // guardrail (a)
  const lab = skills && skills.length ? ' ' + fmt.esc(skills.join(', ')) : '';
  const seg = (o, key, color) => o // guardrail (b): missing side → "never <side>", not 0/0
    ? `<span style="color:${color}">${t('ao.' + key)}${lab} → ${o.meanC.toFixed(2)} (n=${o.n})</span>`
    : `<span class="muted">${t('ao.never')} ${t('ao.' + key)}</span>`;
  const low = ao.lowSample ? ` <span class="badge warn">${t('ao.lowSample')}</span>` : ''; // guardrail (c)
  return `<div class="diag muted">${t('ao.title')}: ${seg(ao.triggered, 'triggered', 'var(--ok)')} · ${seg(ao.notTriggered, 'notTriggered', 'var(--dim)')}${low}</div>`;
}

// Pick the repeat whose answer + checks best represent this task: a passing repeat that captured an
// answer, else any repeat with an answer, else the first (excluded ones only if nothing else). The
// inline Q/A shows THIS repeat; the drilldown below still lists every repeat.
function representativeRepeat(tk) {
  const live = tk.repeats.filter(r => !r.excluded);
  const pool = live.length ? live : tk.repeats;
  return pool.find(r => r.resultPreview && r.C) ?? pool.find(r => r.resultPreview) ?? pool[0] ?? null;
}

// Collapse a repeat's verifierResults into one badge per verifier TYPE (e.g. 5 judge assertions →
// "judge ×5 ✓" green only if all 5 passed, else "3/5" red). Full per-assertion detail rides in the
// hover title and stays exhaustive in the drilldown table.
function verifierSummaryBadges(results) {
  if (!results || !results.length) return '';
  const groups = new Map();
  for (const v of results) {
    const g = groups.get(v.type) ?? { total: 0, pass: 0, details: [] };
    g.total++; if (v.pass) g.pass++;
    if (v.detail) g.details.push(`${v.pass ? '✓' : '✗'} ${v.detail}`);
    groups.set(v.type, g);
  }
  return [...groups.entries()].map(([type, g]) => {
    const allPass = g.pass === g.total;
    const label = g.total > 1 ? `${type} ×${g.total}` : type;
    return `<span class="badge ${allPass ? 'ok' : 'err'}" title="${fmt.esc(g.details.join('\n'))}">${label} ${allPass ? '✓' : `${g.pass}/${g.total}`}</span>`;
  }).join('');
}

function taskPanel(tid, tk, skills = []) {
  const excluded = tk.excludedRepeats ?? 0;
  const rep = representativeRepeat(tk);
  const verdict = tk.successRate === 1 ? `<span class="badge ok">C=1 ✓</span>`
    : tk.successRate === 0 ? `<span class="badge err">C=0</span>`
    : `<span class="badge warn">C ${fmt.pct(tk.successRate)}</span>`;
  const answerHtml = rep && rep.resultPreview
    ? `<code class="res" style="margin:2px 0 0">${fmt.esc(rep.resultPreview)}</code>`
    : `<span class="muted">${t('task.noAnswer')}</span>`;
  const repNote = rep && rep.resultPreview && tk.repeats.length > 1
    ? ` <span class="muted">${t('task.repOf')} r${tk.repeats.indexOf(rep) + 1} / ${tk.repeats.length}</span>` : '';
  const checks = rep ? verifierSummaryBadges(rep.verifierResults) : '';
  return `<div class="panel">
    <h3>${t('task.title')} ${fmt.esc(tid)} ${verdict} ${tk.lowSample ? `<span class="badge warn">${t('badge.lowSample')}</span>` : ''}${tk.degraded ? ` <span class="badge warn" title="${excluded} excluded">${t('badge.degraded')}</span>` : ''}</h3>
    <div class="qa">
      <span class="tag">Q</span><div class="qtext">${fmt.esc(tk.prompt)}</div>
      <span class="tag">A</span><div>${answerHtml}${repNote}</div>
    </div>
    ${checks ? `<div class="vbadges"><span class="muted" style="font-size:11px">${t('task.checks')}</span> ${checks}</div>` : ''}
    <div class="cards">
      ${card(scoreHtml(tk.composite), t('th.composite'))}
      ${card(fmt.pct(tk.successRate), t('card.successRate'))}
      ${card(ciBar(tk.wilsonCi, tk.successRate), t('card.wilson'))}
      ${card(tk.activationRate == null ? t('na') : fmt.pct(tk.activationRate), t('card.activation'))}
      ${card(`${tk.n - tk.failedRepeats}/${tk.n}${excluded ? ` <span class="muted">(${excluded} ${t('badge.excluded')})</span>` : ''}`, t('card.repeatsOk'))}
    </div>
    ${activationOutcomeRow(tk.activationOutcome, skills)}
    <div class="diag muted">${t('task.efficiency')} ${fmt.ms(tk.efficiency.meanDurationMs)} · ${fmt.usd(tk.efficiency.meanCostUsd)} · ${fmt.n(tk.efficiency.meanOutTokens)} out-tokens</div>
    <details data-persist="drilldown"><summary>${t('task.drilldown')} ${tk.repeats.length} ${t('task.repeatsWord')}</summary>
      <table><thead><tr><th>#</th><th>${t('th.run')}</th><th>C</th><th>P</th><th>H</th><th>${t('th.activated')}</th><th>${t('th.rounds')}</th><th>${t('th.verifiers')}</th><th>${t('th.wall')}</th><th>${t('th.error')}</th></tr></thead><tbody>
      ${tk.repeats.map((r, i) => `<tr>
        <td>${i + 1}</td>
        <td>${r.runId ? `<a href="#run/${encodeURIComponent(r.runId)}">${fmt.esc(String(r.runId).slice(0, 8))}…</a>` : '—'}</td>
        <td>${r.excluded ? `<span class="badge warn">${t('badge.excluded')}</span>` : r.C ? '<span class="badge ok">1</span>' : '<span class="badge err">0</span>'}</td>
        <td>${r.P == null ? t('na') : r.P.toFixed(2)}</td><td>${r.H == null ? t('na') : r.H.toFixed(2)}</td>
        <td>${r.activated == null ? '—' : r.activated ? '✓' : '<span style="color:var(--err)">✗</span>'}</td>
        <td>${r.rounds ?? '—'}</td>
        <td>${(r.verifierResults ?? []).map(v => `<span class="badge ${v.pass ? 'ok' : 'err'}" title="${fmt.esc(v.detail)}">${v.type}${v.pass ? '✓' : '✗'}</span>`).join('')}</td>
        <td class="muted">${fmt.ms(r.efficiency?.wallMs ?? 0)}</td>
        <td class="muted">${r.excluded ? fmt.esc(r.excludedSignature ?? t('badge.excluded')) : fmt.esc(r.error ?? r.warning ?? '')}</td>
      </tr>
      ${r.resultPreview ? `<tr><td></td><td colspan="9"><code class="res">${fmt.esc(r.resultPreview)}</code></td></tr>` : ''}`).join('')}
      </tbody></table>
    </details>
  </div>`;
}

// native-title stat tooltip: a dotted-underline term whose plain-language meaning shows in the
// browser's own title bubble on hover (zero-dep — no popover JS). Used for n paired / MIN_PAIRS /
// exclusion / reference-only so the dashboard reads the same as the U7 report end.
function statTip(labelHtml, tip) { return `<span class="statterm" title="${fmt.esc(tip)}">${labelHtml}</span>`; }

// intent → plain-language label (省成本 / 修质量 / 中性重构); the raw enum stays in a native-title
// tooltip for AI cross-reference. en keeps the enum itself (no redundant tooltip).
function intentBadge(intent) {
  if (!intent) return t('na');
  const label = t('intent.' + intent);
  // unmapped (t → key) or a lang whose label IS the raw enum (en) → plain; a real gloss (zh) → tooltip
  return label === 'intent.' + intent || label === intent ? fmt.esc(intent) : statTip(label, intent);
}

// arm/bundle enum value → plain zh label (混搭包 / 旧版整包 / 新版整包) with the raw enum in a
// native-title tooltip for AI cross-reference. A value not in the map (a custom arm label) passes
// through unchanged; en shows the raw value (no redundant tooltip).
const UPG_ENUM_KEYS = { 'mixed-bundle': 'upg.enum.mixed-bundle', 'old-full': 'upg.enum.old-full', 'new-full': 'upg.enum.new-full' };
function enumLabel(value) {
  if (value == null) return '—';
  const key = UPG_ENUM_KEYS[value];
  if (!key) return fmt.esc(value);
  const label = t(key);
  // unmapped (t → key) or a lang whose label IS the raw enum (en) → plain; a real gloss (zh) → tooltip
  return label === key || label === value ? fmt.esc(value) : statTip(label, value);
}

// engine reason strings (report.json `reasons`) are raw English evidence — swap the bare MIN_PAIRS
// variable name for the plain label at display time (original kept in the tooltip). \bMIN_PAIRS\b
// leaves MIN_PAIRS_SKILL untouched (the trailing "_" is a word char, so no boundary there).
function reasonHtml(r) {
  return fmt.esc(r).replace(/\bMIN_PAIRS\b/g, statTip(t('upg.minPairsLabel'), 'MIN_PAIRS'));
}

// verdict → boolean-recommendation badge (user-requested framing). Keeps the four-state glyph
// (✓ recommend:true · ✗ recommend:false · ~ inconclusive · ∅ insufficient-data) but the LABEL reads
// as a recommendation: an intent verdict → "升级推荐: true/false"; the two undecidable verdicts →
// "无法判定(…)", NEVER "false" (they are not a negative signal). intent is listed separately.
function recommendBadge(verdict, established) {
  if (!verdict) return t('na');
  const g = upgradeVerdictGlyph(verdict, established);
  const rec = upgradeRecommendation(verdict, established);
  const label = rec.decidable ? `${t('upg.recommend')}: ${rec.recommended}` : t('upg.undecidable.' + verdict);
  return `<span class="badge ${g.tone === 'dim' ? '' : g.tone}" title="${t('verdict.gloss.' + verdict)}">${g.glyph} ${label}</span>`;
}

// ---- native ECharts for the reference-relationship charts (co-trigger graph / co-read heatmap /
// intent→skill→ref sankey). The dashboard is otherwise ECharts-free (hand-SVG); echarts loads LAZILY
// only when a report/experiment actually shows these charts, so runs/experiments stay +0 deps. Chart
// data shape == report.json/stats `depgraph.{graph,heatmap,sankey}`; the setOption logic is ported
// verbatim from src/report.js report.html (initGraph/initHeat/initSankey), retargeted to dashboard vars.
let _echartsLoading = null;
function ensureEcharts() {
  if (typeof echarts !== 'undefined') return Promise.resolve(true);
  if (_echartsLoading) return _echartsLoading;
  _echartsLoading = new Promise((resolve) => {
    const s = document.createElement('script');
    s.src = 'vendor/echarts-5.6.0.min.js';
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false); // honest degrade: charts show a fallback line, page still works
    document.head.appendChild(s);
  });
  return _echartsLoading;
}
const _charts = []; // live echarts instances — disposed on navigation (render() calls disposeCharts)
function disposeCharts() { while (_charts.length) { const c = _charts.pop(); try { c.dispose(); } catch { /* already gone */ } } }
function gv(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#888'; }

// container HTML for the three relationship charts. depgraph null → nothing. Each chart renders its own
// honest empty state (no data) inside initRelationshipCharts. Reused by upgrade report + experiment page.
function relationshipChartsHtml(depgraph) {
  if (!depgraph) return '';
  return `<div class="panel"><h3>${t('rel.title')}</h3>
    <p class="muted" style="font-size:12px;margin:0 0 8px">${fmt.esc(depgraph.disclaimer ?? t('rel.note'))}${depgraph.n != null ? ` · n=${depgraph.n}` : ''}</p>
    <div class="rel-charts">
      <div><div class="muted" style="font-size:12px">${t('rel.graph')}</div><div id="rc-graph" class="rel-chart"></div></div>
      <div><div class="muted" style="font-size:12px">${t('rel.heat')}</div><div id="rc-heat" class="rel-chart"></div></div>
      <div style="grid-column:1/-1"><div class="muted" style="font-size:12px">${t('rel.sankey')}</div><div id="rc-sankey" class="rel-chart" style="height:220px"></div></div>
    </div></div>`;
}

async function initRelationshipCharts(depgraph) {
  if (!depgraph) return;
  const gEl = document.getElementById('rc-graph'), hEl = document.getElementById('rc-heat'), sEl = document.getElementById('rc-sankey');
  if (!gEl && !hEl && !sEl) return;
  const ok = await ensureEcharts();
  if (!ok) { [gEl, hEl, sEl].forEach(el => { if (el) el.innerHTML = `<div class="muted">${t('rel.echartsFail')}</div>`; }); return; }
  const pct = v => (v == null ? '—' : (v * 100).toFixed(0) + '%');
  const empty = txt => `<div class="muted" style="padding:24px;text-align:center">${txt}</div>`;
  // co-trigger graph (which skills fire together) — ported from report.js initGraph
  const g = depgraph.graph;
  if (gEl && g?.nodes?.length) {
    const c = echarts.init(gEl, null, { renderer: 'canvas' }); _charts.push(c);
    c.setOption({ tooltip: { formatter: p => p.dataType === 'edge' ? `${p.data.source} ↔ ${p.data.target}<br>${t('rel.coTrigger')} ${pct(p.data.value)}` : `${p.name}<br>${t('card.activation')} ${pct(p.value)}` },
      series: [{ type: 'graph', layout: 'circular', roam: true,
        data: g.nodes.map(n => ({ name: n.name, value: n.trigger, symbolSize: 14 + n.trigger * 46, itemStyle: { color: n.locked ? gv('--purple') : gv('--accent') }, label: { formatter: n.locked ? '🔒{b}' : '{b}' } })),
        links: g.edges.map(e => ({ source: e.a, target: e.b, value: e.rate, lineStyle: { width: 1 + e.rate * 7, color: e.merge ? gv('--warn') : gv('--dim'), curveness: 0.08 } })),
        label: { show: true, color: gv('--fg'), fontSize: 11 }, lineStyle: { opacity: .9 }, emphasis: { focus: 'adjacency' } }] });
  } else if (gEl) gEl.innerHTML = empty(t('rel.noGraph'));
  // co-read heatmap (which references get read together — merge candidates) — ported from initHeat
  const h = depgraph.heatmap;
  if (hEl && h?.refs?.length) {
    const c = echarts.init(hEl, null, { renderer: 'canvas' }); _charts.push(c);
    const data = []; h.matrix.forEach((row, i) => row.forEach((val, j) => { if (val != null) data.push([j, i, val]); }));
    c.setOption({ tooltip: { position: 'top', formatter: p => `${h.refs[p.data[1]]} × ${h.refs[p.data[0]]}<br>${t('rel.coRead')} ${pct(p.data[2])}` }, grid: { left: 120, right: 20, top: 20, bottom: 90 },
      xAxis: { type: 'category', data: h.refs, axisLabel: { color: gv('--dim'), rotate: 40, fontSize: 10 } }, yAxis: { type: 'category', data: h.refs, axisLabel: { color: gv('--dim'), fontSize: 10 } },
      visualMap: { min: 0, max: 1, calculable: true, orient: 'horizontal', left: 'center', bottom: 6, textStyle: { color: gv('--dim') }, inRange: { color: ['#161b22', '#1f6feb', '#58a6ff', '#cae8ff'] } },
      series: [{ type: 'heatmap', data, label: { show: true, formatter: p => p.data[2] ? (p.data[2] * 100).toFixed(0) : '', color: '#0d1117', fontSize: 10 }, itemStyle: { borderColor: gv('--border'), borderWidth: 1 } }] });
  } else if (hEl) hEl.innerHTML = empty(t('rel.noHeat'));
  // intent→skill→ref sankey — ported from initSankey
  const s = depgraph.sankey;
  if (sEl && s?.nodes?.length) {
    const c = echarts.init(sEl, null, { renderer: 'canvas' }); _charts.push(c);
    c.setOption({ tooltip: { trigger: 'item', triggerOn: 'mousemove' }, series: [{ type: 'sankey',
      data: s.nodes.map(n => ({ name: n.name, itemStyle: { color: n.tier === 'intent' ? gv('--cyan') : n.tier === 'skill' ? gv('--purple') : gv('--dim') } })),
      links: s.links, emphasis: { focus: 'adjacency' }, label: { color: gv('--fg'), fontSize: 11 }, lineStyle: { color: 'gradient', opacity: .3 }, nodeAlign: 'left' }] });
  } else if (sEl) sEl.innerHTML = empty(t('rel.noSankey'));
}

// ---- U8 view: single upgrade comparison — verdict banner + 3-axis mini-delta cards + per-skill

async function viewUpgrade(compareId) {

// upgrade view: external-tool probe-signal block (design §2.4). null → nothing. tripwired → an
// inconclusive banner (absolutes still shown). Sequence cards are 未验证假说, no adopt button.
function probeBlockPanel(cli) {
  if (!cli) return '';   // no probe configured for this upgrade
  let h = `<div class="panel"><h3>外部工具探针 <span class="muted" style="font-size:12px">${gEx('cli 下沉', 'cliSink')}信号</span></h3>`;
  if (cli.tripwired) h += `<div class="muted" style="border-left:3px solid var(--warn);padding-left:10px;margin-bottom:8px">本节被剔除的题占比过高，两版对比<b>无法判定</b>；各版本绝对值仍照常展示。</div>`;
  for (const w of cli.warnings) h += `<div class="muted" style="border-left:3px solid var(--err);padding-left:10px;margin-bottom:6px;font-size:12px">⚠ ${term('被剔除运行里检测到外部命令', '这些运行已排除，但命中提醒你留意“新版狂打命令又中断”这类被排除规则悄悄洗掉的情况')}：${fmt.esc(w.arm)} 的 <code>${fmt.esc(w.caseId)}</code> 跑了 <code>${fmt.esc(w.tool)}</code> ${fmt.esc((w.cmds || []).join(' / '))}</div>`;
  for (const nc of cli.notComparable) h += `<div class="muted" style="font-size:12px">${fmt.esc(nc.tool)}：两版命令面不同，无法直接对比（${fmt.esc(nc.reason)}）</div>`;
  for (const arm of cli.arms) {
    for (const tl of arm.tools) {
      const cov = tl.coverage;
      const covTxt = !cov ? '无数据' : cov.status === 'unavailable' ? `用到 ${cov.invoked.length} 条（未宣告命令面）` : `${cov.invoked.length}/${cov.declared}${cov.ratio == null ? '' : ' = ' + fmt.pct(cov.ratio)}`;
      h += `<div style="margin:8px 0 2px"><span class="badge">${fmt.esc(arm.arm)}</span> <code>${fmt.esc(tl.tool)}</code> <span class="badge ${tl.coverageStatus.tone === 'ok' ? 'ok' : tl.coverageStatus.tone === 'warn' ? 'warn' : ''}">${fmt.esc(tl.coverageStatus.word)}</span> <span class="muted">${gEx('命令面覆盖', 'commandSurface')} ${covTxt}</span></div>`;
    }
  }
  for (const sq of cli.sequences) h += `<div class="muted" style="font-size:12px">${term('未验证假说', EXP_GLOSSARY.hypothesisSeq)}（${fmt.esc(sq.arm)}）：命令连发 ${fmt.esc(sq.seq.join(' → '))}（${sq.distinctCases} 个不同题目）${sq.knownCollapse ? ' · 注记：或可用 <code>' + fmt.esc(sq.knownCollapse) + '</code>' : ''}</div>`;
  const anyProx = cli.arms.find(a => a.proximityTop.length);
  if (anyProx) {
    h += `<div style="margin:10px 0 4px"><b>${gEx('关联强度', 'proximityStrength')}</b> <span class="muted">时序邻近，非因果</span></div>`;
    h += `<table><thead><tr><th>版本</th><th>前 → 后</th><th>紧邻度</th><th>置信</th><th>lift</th><th>n</th></tr></thead><tbody>`;
    for (const arm of cli.arms) for (const ed of arm.proximityTop) h += `<tr><td><span class="badge">${fmt.esc(arm.arm)}</span></td><td><code>${fmt.esc(ed.from.type + ':' + ed.from.id)}</code> → <code>${fmt.esc(ed.to.type + ':' + ed.to.id)}</code></td><td>${ed.closeness}</td><td>${ed.confidence == null ? '—' : ed.confidence}</td><td>${ed.lift == null ? '—' : ed.lift}</td><td>${ed.pairCases}</td></tr>`;
    h += `</tbody></table>`;
  }
  return h + `</div>`;
}

// PM-B2 next-step guidance panel for insufficient-data / inconclusive — mirrors the HTML report so
// the two never drift. NEVER shows an "adoptable" affordance (R8.EB1).

      <div>${statTip(t('upg.needPairs').replace('{n}', ns.needPairs).replace('{m}', ns.minPairs), t('tip.upg.minPairs'))}</div></div>`;
  }

// mini delta row: label · value · a hand-written SVG CI bar centred on 0 (zero-dep, no ECharts).
// A CI whose lower bound clears the non-inferiority margin reads as ok; one straddling 0 is dim.
function deltaRow(label, delta, ci, n, unit, flags = {}) {
  // routing n/a (skill-less runtime): show 不适用 with reason, no delta bar — routing was never possible
  if (flags.naRouting) {
    return `<div class="score-row"><span class="lbl muted">${label}</span>
      <span class="val" style="width:auto">${statTip(`<span class="muted">${t('upg.naRouting')}</span>`, t('tip.upg.naRouting'))}</span></div>`;
  }
  const badges = [
    flags.sigDown ? `<span class="badge ok">${t('upg.sigDown')}</span>` : '',
    flags.sigUp ? `<span class="badge err">${t('upg.sigUp')}</span>` : '',
    flags.heuristic ? `<span class="badge warn">${t('upg.heuristic')}</span>` : '',
  ].join('');
  // a zero-change axis reads as "— 持平" — no +/- direction, no arrow (user-requested)
  const val = delta == null ? t('na') : delta === 0 ? t('upg.flat') : (delta > 0 ? '+' : '') + delta + unit;
  return `<div class="score-row"><span class="lbl muted">${label}${n != null ? ' ' + statTip(`<span style="opacity:.7">n=${n}</span>`, t('tip.upg.pairs')) : ''}</span>
    ${miniDelta(delta, ci)}
    <span class="val" style="width:auto">${val}${ci && ci.lo != null ? ` <span class="muted" style="font-size:11px">[${ci.lo}, ${ci.hi}]</span>` : ''} ${badges}</span></div>`;
}
function miniDelta(delta, ci) {
  const W = 110, H = 16;
  if (delta == null && (!ci || ci.lo == null)) return `<svg width="${W}" height="${H}"></svg>`;
  const lo = ci?.lo ?? delta, hi = ci?.hi ?? delta;
  const span = Math.max(Math.abs(lo), Math.abs(hi), Math.abs(delta ?? 0), 1e-6);
  const sx = x => W / 2 + (x / span) * (W / 2 - 4); // 0 at centre, symmetric domain
  const bar = ci && ci.lo != null
    ? `<rect x="${Math.min(sx(lo), sx(hi))}" y="5" width="${Math.max(1, Math.abs(sx(hi) - sx(lo)))}" height="${H - 10}" fill="var(--accent)" opacity="0.3"/>` : '';
  const dcol = delta == null ? 'var(--dim)' : delta < 0 ? 'var(--ok)' : delta > 0 ? 'var(--warn)' : 'var(--dim)';
  return `<svg width="${W}" height="${H}" style="vertical-align:middle;flex:none">
    <line x1="${W/2}" y1="0" x2="${W/2}" y2="${H}" stroke="var(--border)"/>${bar}
    ${delta == null ? '' : `<circle cx="${sx(delta)}" cy="${H/2}" r="3.5" fill="${dcol}"/>`}</svg>`;
}

// ---- U8 view: upgrade trend (case-id paired-delta lines; cohort/lineage broken, zero ECharts) ----
async function viewUpgradeTrend() {

  const hasAny = cohorts.some(c => c.segments.some(s => s.series.length));
  $app.innerHTML = `

    <h2 style="margin:6px 0">${t('upg.trendTitle')}</h2>

          <div class="muted" style="margin:6px 0 2px">${t('upg.lineage')}: ${fmt.esc(seg.lineage)} · ${seg.reports.length} ${t('upg.listTab')}</div>
          ${trendChart(seg)}` : '').join('')}

// per-lineage-segment trend: x = successive comparisons, y = each case-id's paired delta. Lines live
// ONLY inside a segment — the caller renders one chart per segment so a superseded genealogy is a
// visual break, never a bridged line (R8.EB4). Hand-written SVG, zero dependencies.
function trendChart(seg) {
  const pts = seg.reports;
  const n = pts.length;
  const W = 620, H = 190, padL = 30, padR = 10, padT = 14, padB = 40;
  const allDeltas = seg.series.flatMap(s => s.points.map(p => p.delta).filter(d => d != null));
  const maxAbs = Math.max(1, ...allDeltas.map(Math.abs));
  const x = i => n === 1 ? (W - padR + padL) / 2 : padL + i / (n - 1) * (W - padL - padR);
  const y = d => padT + (1 - (d / maxAbs + 1) / 2) * (H - padT - padB); // 0 centred; +maxAbs top, −maxAbs bottom
  const palette = ['var(--accent)', 'var(--purple)', 'var(--cyan)', 'var(--warn)', 'var(--ok)', 'var(--err)'];
  let svg = '';
  // zero line + ±maxAbs guides
  svg += `<line x1="${padL}" y1="${y(0)}" x2="${W - padR}" y2="${y(0)}" stroke="var(--border)"/>`;
  svg += `<text x="2" y="${y(0) + 3}" fill="var(--dim)" font-size="9">0</text>`;
  seg.series.forEach((s, si) => {
    const color = palette[si % palette.length];
    const seq = s.points.map((p, i) => ({ i, d: p.delta })).filter(o => o.d != null);
    if (seq.length > 1) svg += `<polyline points="${seq.map(o => `${x(o.i)},${y(o.d)}`).join(' ')}" fill="none" stroke="${color}" stroke-width="2" opacity="0.85"/>`;
    seq.forEach(o => { svg += `<circle cx="${x(o.i)}" cy="${y(o.d)}" r="3" fill="${color}"><title>${fmt.esc(s.caseId)} @ ${fmt.esc(pts[o.i]?.compareId ?? '')}: ${o.d}</title></circle>`; });
  });
  // x-axis: verdict glyph per comparison
  pts.forEach((p, i) => {
    const g = upgradeVerdictGlyph(p.verdict, p.established);
    svg += `<text x="${x(i)}" y="${H - padB + 16}" fill="var(--dim)" font-size="10" text-anchor="middle">${g.glyph}</text>`;
    svg += `<text x="${x(i)}" y="${H - padB + 28}" fill="var(--dim)" font-size="8" text-anchor="middle">${fmt.esc(String(p.createdAt ?? '').slice(5, 10))}</text>`;
  });
  const legend = seg.series.map((s, si) => `<span class="dot" style="background:${palette[si % palette.length]}"></span><span class="muted">${fmt.esc(s.caseId)}</span>`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">${svg}</svg><div class="legend" style="margin-top:4px">${legend}</div>`;
}

// ---- chart helpers (inline SVG, zero deps) ----
function card(v, k) { return `<div class="card"><div class="v">${v}</div><div class="k">${k}</div></div>`; }

// S16: deterministic loop banner — normally silent, fires only on high-confidence structural
// repetition; the evidence (count · tool · round range) is spelled out, never a semantic guess.
function loopBanner(findings) {
  if (!findings || !findings.length) return '';
  const desc = f => `${f.count}× ${t(f.type === 'identical-input' ? 'loop.identical' : 'loop.repeatedErr')} <span class="badge">${fmt.esc(f.tool)}</span> <span class="muted">(${t('chart.round')} ${f.fromSeq}–${f.toSeq})</span>`;
  return `<div class="panel" style="border-color:var(--warn);margin:12px 0">
    <span class="badge warn">⚠ ${t('loop.suspected')}</span>
    <span style="margin-left:6px">${findings.map(desc).join(' · ')}</span></div>`;
}

// S16: four-bucket _attr stacked over turns. NEW chart (not sparkline/barChart, which assume
// non-negative): positive buckets stack up from a baseline; a NEGATIVE residual (compaction /
// cache eviction) is drawn BELOW the baseline as a shrink marker, never as positive height.
function stackedAttrChart(series) {
  if (!series.length) return '<span class="muted">' + t('chart.noData') + '</span>';
  const W = 520, H = 150, padT = 16, padB = 22, plotH = H - padT - padB;
  const maxPos = Math.max(1, ...series.map(s => s.prevOut + s.toolRes + s.injected + Math.max(0, s.residual)));
  const maxNeg = Math.min(0, ...series.map(s => Math.min(0, s.residual))); // <= 0
  const range = (maxPos - maxNeg) || 1;
  const scale = plotH / range;
  const y0 = padT + maxPos * scale;             // baseline y (positive above, negative below)
  const step = (W - 20) / series.length;
  const bw = Math.min(46, step - 4);
  const segs = [['prevOut', 'var(--accent)'], ['toolRes', 'var(--cyan)'], ['injected', 'var(--purple)']];
  const bars = series.map((s, i) => {
    const x = 10 + i * step;
    let yTop = y0, rects = '';
    for (const [key, color] of segs) {
      const h = s[key] * scale;
      if (h > 0.4) { yTop -= h; rects += `<rect x="${x}" y="${yTop}" width="${bw}" height="${h}" fill="${color}"><title>#${s.seq} ${key}: ${fmt.n(s[key])}</title></rect>`; }
    }
    if (s.residual > 0) { const h = s.residual * scale; yTop -= h; rects += `<rect x="${x}" y="${yTop}" width="${bw}" height="${h}" fill="var(--dim)" opacity="0.55"><title>#${s.seq} unattributed: +${fmt.n(s.residual)}</title></rect>`; }
    else if (s.residual < 0) { const h = -s.residual * scale; rects += `<rect x="${x}" y="${y0}" width="${bw}" height="${h}" fill="var(--ok)" opacity="0.5"><title>#${s.seq} ${t('attr.compaction')}: ${fmt.n(s.residual)}${s.compactionKind ? ' — ' + t('tip.compact.' + s.compactionKind) : ''}</title></rect>`; }
    rects += `<text x="${x + bw / 2}" y="${H - 8}" fill="var(--dim)" font-size="10" text-anchor="middle">${s.seq}</text>`;
    return rects;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
    <line x1="10" y1="${y0}" x2="${W - 10}" y2="${y0}" stroke="var(--border)"/>${bars}</svg>`;
}
function scoreColor(x) { return x >= 0.8 ? 'var(--ok)' : x >= 0.5 ? 'var(--warn)' : 'var(--err)'; }
// null-safe score cell: Wave 1 made composite/dimensions nullable (all-excluded / floor breach).
// A null score renders as a dim n/a, never a fake 0 and never a throw on .toFixed.
function scoreHtml(x, dp = 3) { return x == null ? `<span class="muted">${t('na')}</span>` : `<b style="color:${scoreColor(x)}">${x.toFixed(dp)}</b>`; }
function scoreBar(label, v, color) {
  if (v == null) return `<div class="score-row"><span class="lbl muted">${label}</span>
    <div class="bar-bg" style="flex:1"></div><span class="val muted">${t('na')}</span></div>`;
  return `<div class="score-row"><span class="lbl muted">${label}</span>
    <div class="bar-bg" style="flex:1"><div class="bar-fill" style="width:${v * 100}%;background:${color}"></div></div>
    <span class="val">${v.toFixed(3)}</span></div>`;
}
function ciBar(ci, p) {
  const W = 90, H = 14;
  return `<svg width="${W}" height="${H}" style="vertical-align:middle">
    <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="var(--border)"/>
    <rect x="${ci.lo * W}" y="4" width="${Math.max(1, (ci.hi - ci.lo) * W)}" height="${H - 8}" fill="var(--accent)" opacity="0.35"/>
    <circle cx="${p * W}" cy="${H/2}" r="3.5" fill="var(--accent)"/>
  </svg><div class="muted" style="font-size:11px">${ci.lo.toFixed(2)}–${ci.hi.toFixed(2)}</div>`;
}
function sparkline(vals, limit) {
  if (!vals.length) return '<span class="muted">' + t('chart.noData') + '</span>';
  const W = 520, H = 120, max = Math.max(...vals, 1);
  const pts = vals.map((v, i) => `${vals.length === 1 ? W/2 : i / (vals.length - 1) * (W - 20) + 10},${H - 15 - (v / max) * (H - 35)}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
    <polyline points="${pts}" fill="none" stroke="var(--cyan)" stroke-width="2"/>
    ${vals.map((v, i) => `<circle cx="${vals.length === 1 ? W/2 : i / (vals.length - 1) * (W - 20) + 10}" cy="${H - 15 - (v / max) * (H - 35)}" r="3" fill="var(--cyan)"><title>${t('chart.round')} ${i + 1}: ${v.toLocaleString()}</title></circle>`).join('')}
    <text x="10" y="12" fill="var(--dim)" font-size="11">${t('chart.peak')} ${max.toLocaleString()} / ${t('chart.limit')} ${limit.toLocaleString()} (${(max / limit * 100).toFixed(1)}%)</text>
  </svg>`;
}
function barChart(vals) {
  if (!vals.length) return '<span class="muted">' + t('chart.noData') + '</span>';
  const W = 520, H = 120, max = Math.max(...vals, 1), bw = Math.min(40, (W - 20) / vals.length - 4);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
    ${vals.map((v, i) => { const h = (v / max) * (H - 35); return `<rect x="${10 + i * ((W - 20) / vals.length)}" y="${H - 15 - h}" width="${bw}" height="${Math.max(1, h)}" rx="2" fill="var(--accent)"><title>${t('chart.round')} ${i + 1}: ${v.toLocaleString()}</title></rect>`; }).join('')}
    <text x="10" y="12" fill="var(--dim)" font-size="11">${t('chart.maxOut')}: ${max.toLocaleString()}</text>
  </svg>`;
}
</script>
</body>
